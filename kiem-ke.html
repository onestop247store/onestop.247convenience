<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONE STOP - Inventory Audit Hub</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#103F67',
                        sand: '#E4DBD1',
                        gold: '#DAAF4F',
                        blue: '#39A8D9',
                        green: '#0AA878',
                        red: '#F0573A',
                        darkred: '#B92025',
                        slate: '#2D4155'
                    },
                    animation: {
                        'spin-slow': 'spin 3s linear infinite',
                    }
                }
            }
        }
    </script>
    
    <!-- React & Libraries CDN -->
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
    
    <!-- Dùng jsDelivr cho tốc độ ổn định hơn, tránh lỗi tải icon -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.292.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <style>
        body { background-color: #E4DBD1; font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent;}
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
        @keyframes shimmer { 100% { transform: translateX(100%); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const API_URL = "https://script.google.com/macros/s/AKfycbyByQ4WtDdSkVBX87XeWE8KQp2xc1pqBjEijYowudbmR3aPDUy3qfA0KpnVKMQGsvA4lQ/exec";

        // ==========================================
        // COMPONENT ICON THÔNG MINH (CHỐNG LỖI MẤT ICON TRÊN SAFARI)
        // ==========================================
        const Icon = ({ name, className = '' }) => {
            const ref = useRef(null);

            useEffect(() => {
                let interval;
                const renderIcon = () => {
                    if (ref.current && window.lucide) {
                        ref.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                        window.lucide.createIcons({ root: ref.current });
                        return true; 
                    }
                    return false;
                };

                // Liên tục thử render icon mỗi 100ms cho đến khi thư viện Lucide tải xong từ CDN
                if (!renderIcon()) {
                    interval = setInterval(() => {
                        if (renderIcon()) {
                            clearInterval(interval);
                        }
                    }, 100);
                }

                return () => {
                    if (interval) clearInterval(interval);
                };
            }, [name, className]);

            return <span ref={ref} style={{ display: 'contents' }}></span>;
        };

        // --- COMPONENT AVATAR ---
        const ProductAvatar = ({ url }) => {
            if (url) return <img src={url} alt="avatar" className="w-12 h-12 rounded-xl object-cover border border-sand/50 shadow-sm shrink-0 bg-white" />;
            return <div className="w-12 h-12 rounded-xl bg-navy/5 border border-navy/10 flex items-center justify-center shrink-0"><Icon name="package" className="w-6 h-6 text-slate/40" /></div>;
        };

        // --- COMPONENT FULLSCREEN SCANNER (NATIVE UX) ---
        const FullscreenScanner = ({ onScanSuccess, onClose }) => {
            const [hasTorch, setHasTorch] = useState(false);
            const [torchOn, setTorchOn] = useState(false);
            const [zoomMax, setZoomMax] = useState(1);
            const [zoomLevel, setZoomLevel] = useState(1);
            const scannerRef = useRef(null);

            useEffect(() => {
                if (!window.Html5Qrcode) {
                    alert("Đang tải thư viện Camera, vui lòng thử lại sau giây lát.");
                    onClose();
                    return;
                }

                const html5QrCode = new window.Html5Qrcode("native-scanner-view");
                scannerRef.current = html5QrCode;

                const config = {
                    fps: 15,
                    qrbox: (viewfinderWidth, viewfinderHeight) => ({
                        width: Math.floor(viewfinderWidth * 0.85),
                        height: 250
                    }),
                    aspectRatio: window.innerHeight / window.innerWidth,
                    videoConstraints: { facingMode: "environment" }
                };

                html5QrCode.start(
                    { facingMode: "environment" },
                    config,
                    (decodedText) => {
                        if (decodedText) {
                            html5QrCode.stop().then(() => onScanSuccess(decodedText.trim()));
                        }
                    },
                    (error) => {} 
                ).then(() => {
                    try {
                        const track = html5QrCode.getRunningTrack();
                        if (track) {
                            const capabilities = track.getCapabilities();
                            if (capabilities.torch) setHasTorch(true);
                            if (capabilities.zoom) setZoomMax(capabilities.zoom.max);
                        }
                    } catch (e) { console.log("Thiết bị không hỗ trợ Flash/Zoom mở rộng"); }
                }).catch(err => {
                    alert("Không thể mở Camera. Vui lòng cấp quyền trong cài đặt trình duyệt!");
                    onClose();
                });

                return () => { if (html5QrCode.isScanning) html5QrCode.stop().catch(console.error); };
            }, [onScanSuccess, onClose]);

            const toggleTorch = async () => {
                if (scannerRef.current && scannerRef.current.isScanning) {
                    try {
                        await scannerRef.current.applyVideoConstraints({ advanced: [{ torch: !torchOn }] });
                        setTorchOn(!torchOn);
                    } catch (error) { alert("Thiết bị không hỗ trợ bật Flash qua trình duyệt."); }
                }
            };

            const handleZoom = async (val) => {
                setZoomLevel(val);
                if (scannerRef.current && scannerRef.current.isScanning) {
                    try { await scannerRef.current.applyVideoConstraints({ advanced: [{ zoom: val }] }); } 
                    catch(err) { console.error("Lỗi zoom", err); }
                }
            };

            return (
                <div className="fixed inset-0 z-[200] bg-black flex flex-col animate-in fade-in duration-300">
                    <div id="native-scanner-view" className="absolute inset-0 w-full h-full [&>video]:w-full [&>video]:h-full [&>video]:object-cover"></div>
                    
                    <div className="absolute inset-0 pointer-events-none flex flex-col items-center justify-center z-10">
                        <div className="relative w-[85%] max-w-sm h-[250px] shadow-[0_0_0_4000px_rgba(0,0,0,0.65)] rounded-3xl">
                            <div className="absolute -top-1 -left-1 w-14 h-14 border-t-4 border-l-4 border-[#39A8D9] rounded-tl-3xl shadow-[-2px_-2px_8px_rgba(57,168,217,0.3)]"></div>
                            <div className="absolute -top-1 -right-1 w-14 h-14 border-t-4 border-r-4 border-[#39A8D9] rounded-tr-3xl shadow-[2px_-2px_8px_rgba(57,168,217,0.3)]"></div>
                            <div className="absolute -bottom-1 -left-1 w-14 h-14 border-b-4 border-l-4 border-[#39A8D9] rounded-bl-3xl shadow-[-2px_2px_8px_rgba(57,168,217,0.3)]"></div>
                            <div className="absolute -bottom-1 -right-1 w-14 h-14 border-b-4 border-r-4 border-[#39A8D9] rounded-br-3xl shadow-[2px_2px_8px_rgba(57,168,217,0.3)]"></div>
                        </div>
                    </div>

                    <div className="absolute top-0 w-full px-6 pt-12 pb-6 z-20 flex items-start justify-between bg-gradient-to-b from-black/80 to-transparent">
                        <button onClick={onClose} className="text-white p-3 rounded-full bg-white/20 backdrop-blur-md hover:bg-white/30 transition-all pointer-events-auto shadow-md">
                            <Icon name="x" className="w-6 h-6" />
                        </button>
                        <div className="flex-1 text-center pr-[52px]">
                            <h2 className="text-white font-bold text-xl drop-shadow-md">Quét mã vạch</h2>
                            <p className="text-white/80 text-sm mt-1 font-medium px-2">Đặt Barcode/QRcode vào trong khung</p>
                        </div>
                    </div>

                    <div className="absolute bottom-0 w-full px-6 pb-[100px] pt-8 z-20 flex flex-col items-center gap-6 bg-gradient-to-t from-black/90 via-black/50 to-transparent pointer-events-auto">
                        {hasTorch && (
                            <button onClick={toggleTorch} className={`p-4 rounded-full backdrop-blur-xl transition-all ${torchOn ? 'bg-white text-black shadow-[0_0_25px_rgba(255,255,255,0.8)] scale-110' : 'bg-black/40 text-white border border-white/20 hover:bg-black/60'}`}>
                                <Icon name="zap" className={`w-6 h-6 ${torchOn ? 'fill-current' : ''}`} />
                            </button>
                        )}
                        {zoomMax > 1 && (
                            <div className="w-full max-w-[300px] flex items-center gap-4 bg-black/50 px-5 py-3 rounded-full backdrop-blur-md border border-white/20">
                                <button onClick={() => handleZoom(Math.max(1, zoomLevel - 0.5))}><Icon name="zoom-out" className="text-white/80 active:text-white w-5 h-5" /></button>
                                <input type="range" min="1" max={zoomMax} step="0.1" value={zoomLevel} onChange={(e) => handleZoom(parseFloat(e.target.value))} className="w-full h-1.5 bg-white/20 rounded-lg appearance-none [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:w-5 [&::-webkit-slider-thumb]:h-5 [&::-webkit-slider-thumb]:bg-[#39A8D9] [&::-webkit-slider-thumb]:rounded-full [&::-webkit-slider-thumb]:shadow-lg" />
                                <button onClick={() => handleZoom(Math.min(zoomMax, zoomLevel + 0.5))}><Icon name="zoom-in" className="text-white/80 active:text-white w-5 h-5" /></button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- COMPONENT TÌM KIẾM THÔNG MINH ---
        const SmartProductSearch = ({ value, onChange, onManualSearch, onClear, masterProducts, onProductSelect, onScanClick }) => {
            const [suggestions, setSuggestions] = useState([]);
            const [isOpen, setIsOpen] = useState(false);
            const wrapperRef = useRef(null);

            useEffect(() => {
                function handleClickOutside(event) {
                    if (wrapperRef.current && !wrapperRef.current.contains(event.target)) { 
                        setIsOpen(false); 
                        if (value && value.trim() !== '' && onManualSearch) {
                            onManualSearch(value.trim());
                        }
                    }
                }
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, [value, onManualSearch]);

            const handleInputChange = (e) => {
                const val = e.target.value;
                onChange(val);
                if (val.trim() === '') { setSuggestions([]); setIsOpen(false); return; }

                const cleanVal = val.toLowerCase().trim();
                const filtered = masterProducts.filter(p => {
                    const nameStr = p.name ? String(p.name).toLowerCase() : '';
                    const bcStr = p.barcode ? String(p.barcode) : '';
                    return nameStr.includes(cleanVal) || bcStr.includes(cleanVal) || bcStr.slice(-6).includes(cleanVal);
                });

                setSuggestions(filtered.slice(0, 5));
                setIsOpen(true);
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault(); 
                    setIsOpen(false);
                    if (value && value.trim() !== '' && onManualSearch) onManualSearch(value.trim());
                }
            };

            const isInputFilled = value.trim().length > 0;

            return (
                <div ref={wrapperRef} className="relative w-full flex gap-2">
                    <div className="relative flex-1">
                        <input 
                            type="text" value={value} onChange={handleInputChange} onKeyDown={handleKeyDown}
                            onFocus={() => value && suggestions.length > 0 && setIsOpen(true)}
                            className="w-full bg-white shadow-sm border border-navy/10 rounded-2xl p-4 pr-12 text-base font-bold text-navy outline-none focus:ring-2 focus:ring-blue transition-all" 
                            placeholder="Quét mã hoặc điền tên/mã..." 
                        />
                        {isInputFilled && (
                            <button type="button" onMouseDown={(e) => e.preventDefault()} onClick={() => { onChange(''); setIsOpen(false); if (onClear) onClear(); }}
                                className="absolute right-3 top-1/2 -translate-y-1/2 text-navy/30 hover:text-red transition-colors p-2"
                            >
                                <Icon name="x-circle" className="w-5 h-5" />
                            </button>
                        )}
                        {isOpen && suggestions.length > 0 && (
                            <div className="absolute left-0 right-0 mt-2 bg-white rounded-3xl shadow-xl border border-sand/50 overflow-hidden z-[70] animate-in fade-in max-h-64 overflow-y-auto">
                                {suggestions.map((p, idx) => (
                                    <div key={idx} onMouseDown={(e) => e.preventDefault()} onClick={() => { setIsOpen(false); onProductSelect(p); }}
                                        className="p-3 hover:bg-sand/30 cursor-pointer border-b border-sand/10 transition-colors flex items-center gap-4"
                                    >
                                        <ProductAvatar url={p.imageUrl} />
                                        <div className="flex-1 min-w-0">
                                            <p className="font-bold text-navy text-sm leading-tight truncate">{p.name}</p>
                                            <p className="text-xs text-slate font-mono mt-0.5 tracking-wide">{String(p.barcode)}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                    {isInputFilled ? (
                        <button type="button" onClick={() => { setIsOpen(false); if(onManualSearch) onManualSearch(value.trim()); }} className="bg-gold hover:bg-gold/80 text-navy p-4 rounded-2xl flex items-center justify-center w-14 shrink-0 transition-colors shadow-sm">
                            <Icon name="search" />
                        </button>
                    ) : (
                        <button type="button" onClick={onScanClick} className="bg-navy hover:bg-slate text-sand p-4 rounded-2xl flex items-center justify-center w-14 shrink-0 transition-colors shadow-sm">
                            <Icon name="scan-line" />
                        </button>
                    )}
                </div>
            );
        };

        const navigateTo = (url) => {
            try { window.location.href = url; } 
            catch (error) { alert("Tính năng chuyển sang trang " + url + " sẽ hoạt động bình thường bên ngoài Canvas."); }
        };

        // ==========================================
        // COMPONENT CHÍNH APP
        // ==========================================
        const App = () => {
            // State Xác thực
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [staffName, setStaffName] = useState('');
            const [tempNameInput, setTempNameInput] = useState('');
            const [isLoggingIn, setIsLoggingIn] = useState(false);
            
            const nameWordCount = tempNameInput.trim().split(/\s+/).filter(Boolean).length;
            const isNameValid = nameWordCount > 0 && nameWordCount <= 2;

            // State Dữ Liệu
            const initialSession = JSON.parse(localStorage.getItem('ONE_STOP_AUDIT_CAMPAIGN_CURRENT')) || { unsyncedScans: [] };
            const [masterProducts, setMasterProducts] = useState([]);
            const [scannedItems, setScannedItems] = useState(initialSession.unsyncedScans); 
            const [uncountedItems, setUncountedItems] = useState([]); 
            
            // STATE ĐỒNG BỘ GLOBAL
            const [globalStats, setGlobalStats] = useState({ countedSKU: 0, leaderboard: {}, countedBarcodes: [] });
            const [isFetchingGlobal, setIsFetchingGlobal] = useState(false);

            const [searchInput, setSearchInput] = useState('');
            const [currentProduct, setCurrentProduct] = useState(null);
            const [actualQty, setActualQty] = useState('');
            
            const [isScanning, setIsScanning] = useState(false);
            const [activeTab, setActiveTab] = useState('scan'); 
            const [isSyncing, setIsSyncing] = useState(false);
            
            // Pop-ups
            const [duplicateItem, setDuplicateItem] = useState(null); 
            const [negativeStockWarning, setNegativeStockWarning] = useState(null);
            const [serverOverwriteConfirm, setServerOverwriteConfirm] = useState(null);
            const [showResetModal, setShowResetModal] = useState(false);
            const [resetPin, setResetPin] = useState('');
            const [resetError, setResetError] = useState('');

            // 1. Tải tiến độ từ Server (V2.0: CHUẨN XÁC, LOẠI BỎ CORS HEADER, CHỐNG CACHE BẰNG DATE.NOW)
            const fetchGlobalProgress = async () => {
                setIsFetchingGlobal(true);
                try {
                    // Dùng &t=Date.now() là đủ để trình duyệt tải mới dữ liệu, không dùng custom headers để tránh lỗi CORS
                    const url = `${API_URL}?action=getKiemKeProgress&t=${Date.now()}`;
                    const res = await fetch(url);
                    const data = await res.json();
                    if (!data.error) setGlobalStats(data);
                } catch (error) { 
                    console.log("Lỗi tải Global Stats:", error); 
                } finally { 
                    setIsFetchingGlobal(false); 
                }
            };

            useEffect(() => { fetchGlobalProgress(); }, []);

            // 2. Khởi tạo Master Data từ Cache
            useEffect(() => {
                const loadSharedCache = () => {
                    const cached = localStorage.getItem('ONE_STOP_PRODUCTS_CACHE');
                    const learnedCoords = JSON.parse(localStorage.getItem('ONE_STOP_LEARNED_COORDS')) || {};

                    if (cached) {
                        const parsed = JSON.parse(cached);
                        const preparedProducts = (parsed.products || []).map((p, index) => {
                            return {
                                ...p,
                                learnedIndex: learnedCoords[p.barcode] !== undefined ? learnedCoords[p.barcode] : (p.learnedIndex || (index + 1) * 100000),
                                systemQty: p.systemQty !== undefined ? p.systemQty : 0
                            };
                        });
                        preparedProducts.sort((a, b) => a.learnedIndex - b.learnedIndex);
                        setMasterProducts(preparedProducts);
                    }
                };
                loadSharedCache();
            }, []);

            // 3. Lọc Tab Thiếu thông minh
            useEffect(() => {
                if (masterProducts.length > 0) {
                    const allCountedSet = new Set([
                        ...(globalStats.countedBarcodes || []),
                        ...scannedItems.map(item => item.barcode)
                    ]);
                    setUncountedItems(masterProducts.filter(p => !allCountedSet.has(p.barcode)));
                }
            }, [masterProducts, globalStats.countedBarcodes, scannedItems]);

            // 4. Lưu Nháp vào LocalStorage
            useEffect(() => {
                localStorage.setItem('ONE_STOP_AUDIT_CAMPAIGN_CURRENT', JSON.stringify({ unsyncedScans: scannedItems }));
            }, [scannedItems]);

            // --- THUẬT TOÁN AI ROUTE SUGGESTIONS CHO TAB 1 ---
            const smartShelfSuggestions = useMemo(() => {
                if (scannedItems.length === 0 || uncountedItems.length === 0) return [];
                const lastCoord = scannedItems[0].learnedIndex;
                return [...uncountedItems]
                    .sort((a, b) => Math.abs(a.learnedIndex - lastCoord) - Math.abs(b.learnedIndex - lastCoord))
                    .slice(0, 4);
            }, [scannedItems, uncountedItems]);

            // --- ĐĂNG NHẬP THÔNG MINH TTL 120 PHÚT ---
            const handleSmartLogin = async () => {
                if (!isNameValid) return;
                setIsLoggingIn(true);
                try {
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: "checkAndSyncSapoTTL" })
                    });
                    const data = await res.json();
                    if (data.status === "synced" && data.updatedProducts) {
                        const cachedObj = JSON.parse(localStorage.getItem('ONE_STOP_PRODUCTS_CACHE')) || {};
                        cachedObj.products = data.updatedProducts;
                        localStorage.setItem('ONE_STOP_PRODUCTS_CACHE', JSON.stringify(cachedObj));
                        
                        setMasterProducts(prev => {
                            const learnedCoords = JSON.parse(localStorage.getItem('ONE_STOP_LEARNED_COORDS')) || {};
                            return data.updatedProducts.map((p, idx) => ({
                                ...p,
                                learnedIndex: learnedCoords[p.barcode] !== undefined ? learnedCoords[p.barcode] : (p.learnedIndex || (idx + 1) * 100000)
                            }));
                        });
                    }
                } catch (e) { console.warn("Mất kết nối lúc login, dùng cache hiện tại."); } 
                finally {
                    setStaffName(tempNameInput.trim());
                    setIsAuthenticated(true);
                    setIsLoggingIn(false);
                }
            };

            const handleProductSelect = (prod) => {
                const alreadyScanned = scannedItems.find(item => item.barcode === prod.barcode);
                if (alreadyScanned) { setDuplicateItem(alreadyScanned); return; }

                if (prod.systemQty < 0) setNegativeStockWarning(prod);

                setSearchInput(prod.name);
                setCurrentProduct(prod);
                setActualQty('');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleManualSearch = (code) => {
                const cleanCode = code.trim();
                if (!cleanCode) return;
                setIsScanning(false);
                if (currentProduct && (String(currentProduct.barcode) === cleanCode || String(currentProduct.name || '').toLowerCase() === cleanCode.toLowerCase())) return;

                const found = masterProducts.find(p => String(p.barcode) === cleanCode || String(p.name || '').toLowerCase() === cleanCode.toLowerCase());
                if (found) handleProductSelect(found);
                else alert("Không tìm thấy sản phẩm này trong danh mục!");
            };

            const handleClearSearch = () => {
                setSearchInput(''); setCurrentProduct(null); setActualQty('');
            };

            useEffect(() => {
                const cleanCode = searchInput.trim();
                if ((cleanCode.length === 8 || cleanCode.length === 13) && /^\d+$/.test(cleanCode)) {
                    handleManualSearch(cleanCode);
                }
            }, [searchInput]);

            // --- HÀM THỰC THI LƯU TRỮ VÀ HỌC LỘ TRÌNH (UPSERT LOGIC) ---
            const executeSaveCount = (targetProduct, targetQty) => {
                const prod = targetProduct || currentProduct;
                const countVal = targetQty !== undefined ? targetQty : parseInt(actualQty);
                const now = new Date();
                
                let newCoordinate = prod.learnedIndex;
                if (scannedItems.length > 0) {
                    const lastScannedItem = scannedItems[0];
                    const lastCoord = lastScannedItem.learnedIndex;
                    const allSorted = [...masterProducts].sort((a, b) => a.learnedIndex - b.learnedIndex);
                    const lastScannedIndexInMap = allSorted.findIndex(p => p.barcode === lastScannedItem.barcode);

                    let nextCoord = lastCoord + 100000;
                    if (lastScannedIndexInMap >= 0 && lastScannedIndexInMap < allSorted.length - 1) {
                        const nextItemInMap = allSorted[lastScannedIndexInMap + 1];
                        if (nextItemInMap.barcode !== prod.barcode) nextCoord = nextItemInMap.learnedIndex;
                        else if (lastScannedIndexInMap < allSorted.length - 2) nextCoord = allSorted[lastScannedIndexInMap + 2].learnedIndex;
                    }

                    if (prod.learnedIndex <= lastCoord || prod.learnedIndex >= nextCoord) {
                        newCoordinate = (lastCoord + nextCoord) / 2;
                        const learnedCoords = JSON.parse(localStorage.getItem('ONE_STOP_LEARNED_COORDS')) || {};
                        learnedCoords[prod.barcode] = newCoordinate;
                        localStorage.setItem('ONE_STOP_LEARNED_COORDS', JSON.stringify(learnedCoords));
                        setMasterProducts(prev => prev.map(p => p.barcode === prod.barcode ? { ...p, learnedIndex: newCoordinate } : p));
                    }
                }

                const dd = String(now.getDate()).padStart(2, '0');
                const mm = String(now.getMonth() + 1).padStart(2, '0');
                const timeStr = now.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
                
                // ĐÁNH GIÁ TRẠNG THÁI CỘT J (ANTI-CHEAT)
                const diff = countVal - prod.systemQty;
                let badge = 'ĐỦ';
                let auditNote = 'Đếm chuẩn lần đầu';

                if (diff > 0) badge = 'DƯ';
                if (diff < 0) badge = 'THIẾU';

                const existingItem = scannedItems.find(i => i.barcode === prod.barcode);
                if (existingItem || prod.isBeingEdited) {
                    const firstTime = prod.firstTimestampMs || now.getTime();
                    const elapsedMinutes = (now.getTime() - firstTime) / (1000 * 60);
                    const firstQty = prod.firstQty !== undefined ? prod.firstQty : countVal;
                    
                    auditNote = `Sửa từ ${firstQty} -> ${countVal} (sau ${Math.round(elapsedMinutes)}p)`;

                    if (elapsedMinutes <= 10 && firstQty !== prod.systemQty && countVal === prod.systemQty) {
                        badge = 'CẦN CHECK LẠI';
                    }
                }

                if (globalStats.countedBarcodes?.includes(prod.barcode)) {
                    auditNote = `Cập nhật lại Server (Mới: ${countVal})`;
                }

                const countedItem = {
                    ...prod,
                    learnedIndex: newCoordinate,
                    actualQty: countVal,
                    diff: diff,
                    timestampStr: `${timeStr} - ${dd}/${mm}`, 
                    timestampMs: now.getTime(),
                    firstTimestampMs: prod.firstTimestampMs || now.getTime(),
                    firstQty: prod.firstQty !== undefined ? prod.firstQty : countVal,
                    staffName: staffName,
                    statusBadge: badge,
                    auditNote: auditNote,
                    isBeingEdited: false
                };

                setScannedItems(prev => [countedItem, ...prev.filter(i => i.barcode !== prod.barcode)]);
                setServerOverwriteConfirm(null);
                handleClearSearch();
            };

            const handleSaveCount = () => {
                if (!currentProduct || actualQty === '') return;
                const countVal = parseInt(actualQty);

                if (globalStats.countedBarcodes?.includes(currentProduct.barcode)) {
                    setServerOverwriteConfirm({ product: currentProduct, newQty: countVal });
                    return;
                }
                executeSaveCount(currentProduct, countVal);
            };

            const handleSyncToServer = async () => {
                if (scannedItems.length === 0) return alert("Chưa có dữ liệu nào để gửi!");
                if (!confirm(`Bạn có chắc chắn muốn gửi ${scannedItems.length} sản phẩm đã kiểm lên hệ thống?`)) return;

                setIsSyncing(true);
                try {
                    const payload = { action: "submitKiemKe", items: scannedItems };
                    await fetch(API_URL, { 
                        method: 'POST', 
                        body: JSON.stringify(payload) 
                    });
                    
                    alert("Đã gửi dữ liệu kiểm kê thành công!");
                    setScannedItems([]); 
                    
                    // Delay 1s để Sheet kịp xử lý UPSERT trước khi tải lại Bảng tiến độ
                    setTimeout(() => {
                        fetchGlobalProgress();
                    }, 1000);
                    
                } catch (error) { 
                    alert("Mạng không ổn định! Dữ liệu nháp vẫn được giữ an toàn trên máy, hãy thử lại."); 
                } finally { 
                    setIsSyncing(false); 
                }
            };

            const confirmResetCampaign = async () => {
                if (resetPin !== '56789') { setResetError('Mã PIN không chính xác!'); return; }
                try {
                    await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "resetKiemKe" }) });
                    localStorage.removeItem('ONE_STOP_AUDIT_CAMPAIGN_CURRENT');
                    alert("Đã thiết lập lại Kỳ kiểm kê mới thành công!");
                    window.location.reload();
                } catch (error) { setResetError("Lỗi kết nối khi reset hệ thống!"); }
            };

            const handleEditScannedItem = (itemToEdit) => {
                setScannedItems(prev => prev.filter(item => item.barcode !== itemToEdit.barcode));
                setCurrentProduct({ ...itemToEdit, isBeingEdited: true });
                setSearchInput(itemToEdit.name);
                setActualQty(''); 
                setActiveTab('scan');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const sortedUncounted = useMemo(() => {
                if (scannedItems.length === 0) return [...uncountedItems].sort((a, b) => a.learnedIndex - b.learnedIndex);
                const targetIndex = scannedItems[0].learnedIndex;
                return [...uncountedItems].sort((a, b) => Math.abs(a.learnedIndex - targetIndex) - Math.abs(b.learnedIndex - targetIndex));
            }, [uncountedItems, scannedItems]);

            const localOnlyScans = scannedItems.filter(i => !(globalStats.countedBarcodes || []).includes(i.barcode));
            const totalSKU = masterProducts.length;
            const countedSKU = (globalStats.countedSKU || 0) + localOnlyScans.length;
            const progressPct = totalSKU > 0 ? Math.round((countedSKU / totalSKU) * 100) : 0;
            
            const combinedStats = { ...(globalStats.leaderboard || {}) };
            localOnlyScans.forEach(item => { combinedStats[item.staffName] = (combinedStats[item.staffName] || 0) + 1; });
            const staffStatsArray = Object.entries(combinedStats).sort((a, b) => b[1] - a[1]);

            return (
                <div className="bg-sand min-h-screen font-sans pb-28 relative">
                    
                    {/* MÀN HÌNH KHÓA ĐĂNG NHẬP THÔNG MINH */}
                    {!isAuthenticated && (
                        <div className="fixed inset-0 bg-navy/80 z-[300] flex flex-col items-center justify-center p-4 backdrop-blur-md animate-in fade-in">
                            <div className="bg-white p-8 rounded-[2rem] w-full max-w-sm shadow-2xl relative flex flex-col items-center">
                                <div className="w-20 h-20 bg-gold/10 text-gold rounded-full flex items-center justify-center mb-4 shadow-inner">
                                    <Icon name="user-check" className="w-10 h-10" />
                                </div>
                                <h2 className="text-2xl font-bold text-navy mb-2 text-center">Bắt đầu kiểm kê</h2>
                                <p className="text-sm text-slate text-center mb-6">Định danh kết quả kiểm đếm của bạn.</p>
                                
                                <input
                                    type="text" value={tempNameInput}
                                    onChange={(e) => setTempNameInput(e.target.value.toUpperCase())}
                                    onKeyDown={(e) => { if (e.key === 'Enter' && isNameValid && !isLoggingIn) handleSmartLogin(); }}
                                    placeholder="VD: HẠNH, VĂN A..."
                                    className={`w-full bg-sand/20 border-2 rounded-2xl p-4 text-xl font-bold text-navy outline-none transition-colors text-center uppercase mb-2 ${nameWordCount > 2 ? 'border-red/50 focus:border-red bg-red/5' : 'border-navy/10 focus:border-blue'}`}
                                    autoFocus
                                />
                                
                                <div className="h-6 mb-4 flex items-center justify-center w-full">
                                    {nameWordCount > 2 ? (
                                        <p className="text-red text-xs font-bold animate-pulse">Lỗi: Chỉ được nhập tối đa 2 chữ!</p>
                                    ) : (
                                        <p className="text-slate/50 text-[11px] font-medium">Hệ thống tự động in hoa (Tối đa 2 chữ)</p>
                                    )}
                                </div>

                                <button
                                    onClick={handleSmartLogin} disabled={!isNameValid || isLoggingIn}
                                    className={`w-full font-bold py-4 rounded-2xl text-lg flex items-center justify-center gap-2 transition-all ${isNameValid && !isLoggingIn ? 'bg-navy text-sand shadow-lg hover:bg-slate' : 'bg-sand text-slate/40 cursor-not-allowed'}`}
                                >
                                    {isLoggingIn && <Icon name="loader-2" className="w-5 h-5 animate-spin text-gold" />}
                                    {isLoggingIn ? "ĐANG ĐỒNG BỘ DỮ LIỆU..." : "VÀO KIỂM KÊ"}
                                </button>
                                <button onClick={() => navigateTo('index.html')} className="mt-6 text-sm font-semibold text-slate/60 hover:text-navy underline">Quay lại Dashboard</button>
                            </div>
                        </div>
                    )}

                    {/* POP-UP: CẢNH BÁO TRÙNG LẶP SẢN PHẨM NHÁP */}
                    {duplicateItem && (
                        <div className="fixed inset-0 bg-navy/80 z-[200] flex items-center justify-center px-4 backdrop-blur-sm animate-in fade-in">
                            <div className="bg-white p-6 rounded-3xl w-full max-w-sm shadow-2xl scale-in-center">
                                <div className="w-16 h-16 bg-gold/10 text-gold rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="alert-circle" className="w-8 h-8" /></div>
                                <h3 className="text-center font-bold text-navy text-lg mb-2">Sản phẩm có trong nháp!</h3>
                                <p className="text-center text-slate text-sm mb-6">
                                    Mã <strong className="font-mono bg-sand/50 px-1 rounded">{duplicateItem.barcode}</strong> đang chờ gửi với số lượng <strong className="text-navy text-base">{duplicateItem.actualQty}</strong>.<br/><br/>
                                    Vui lòng cập nhật lại số lượng nếu cần điều chỉnh.
                                </p>
                                <div className="flex gap-3">
                                    <button onClick={() => { setDuplicateItem(null); handleClearSearch(); }} className="flex-1 py-3 rounded-xl font-bold text-navy bg-sand/30 hover:bg-sand/50">Bỏ qua</button>
                                    <button onClick={() => { handleEditScannedItem(duplicateItem); setDuplicateItem(null); }} className="flex-1 py-3 rounded-xl font-bold text-navy bg-gold hover:bg-gold/80 shadow-md">Cập nhật lại</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* POP-UP: CẢNH BÁO TỒN KHO ÂM TỪ SAPO */}
                    {negativeStockWarning && (
                        <div className="fixed inset-0 bg-darkred/90 z-[250] flex items-center justify-center px-4 backdrop-blur-md animate-in fade-in">
                            <div className="bg-white p-6 rounded-3xl w-full max-w-sm shadow-2xl scale-in-center border-4 border-red">
                                <div className="w-16 h-16 bg-red/10 text-red rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="alert-triangle" className="w-8 h-8 animate-bounce" /></div>
                                <h3 className="text-center font-black text-navy text-lg mb-2">CẢNH BÁO TỒN KHO ÂM!</h3>
                                <p className="text-center text-slate text-sm mb-6">
                                    Sản phẩm <strong className="text-navy">{negativeStockWarning.name}</strong> đang có số tồn trên Sapo là <strong className="text-red font-mono text-base">{negativeStockWarning.systemQty}</strong>.<br/><br/>
                                    Vui lòng <strong>KIỂM ĐẾM THỰC TẾ 100% TRÊN KỆ</strong> và nhập chính xác số lượng vật lý đang có!
                                </p>
                                <button onClick={() => setNegativeStockWarning(null)} className="w-full py-3.5 rounded-xl font-bold text-white bg-navy hover:bg-slate shadow-lg">ĐÃ HIỂU, TÔI SẼ ĐẾM KỸ</button>
                            </div>
                        </div>
                    )}

                    {/* POP-UP: XÁC NHẬN CẬP NHẬT GHI ĐÈ SERVER */}
                    {serverOverwriteConfirm && (
                        <div className="fixed inset-0 bg-navy/85 z-[260] flex items-center justify-center px-4 backdrop-blur-md animate-in fade-in">
                            <div className="bg-white p-6 rounded-3xl w-full max-w-sm shadow-2xl scale-in-center border-2 border-gold">
                                <div className="w-16 h-16 bg-gold/15 text-gold rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="refresh-cw" className="w-8 h-8 animate-spin-slow" /></div>
                                <h3 className="text-center font-black text-navy text-lg mb-2">Cập Nhật Tồn Kho Server?</h3>
                                <p className="text-center text-slate text-sm mb-6 leading-relaxed">
                                    Sản phẩm <strong className="text-navy font-bold">{serverOverwriteConfirm.product.name}</strong> (<span className="font-mono text-xs">{serverOverwriteConfirm.product.barcode}</span>) đã được kiểm kê trước đó.<br/><br/>
                                    Bạn có chắc chắn muốn dùng số lượng thực đếm mới là <strong className="text-2xl text-navy font-black block my-1">{serverOverwriteConfirm.newQty}</strong> để cập nhật lại hệ thống?
                                </p>
                                <div className="flex gap-3">
                                    <button onClick={() => setServerOverwriteConfirm(null)} className="flex-1 py-3.5 rounded-xl font-bold text-slate bg-sand/40 hover:bg-sand/70">Hủy bỏ</button>
                                    <button onClick={() => executeSaveCount(serverOverwriteConfirm.product, serverOverwriteConfirm.newQty)} className="flex-1 py-3.5 rounded-xl font-bold text-navy bg-gold hover:bg-gold/80 shadow-lg flex items-center justify-center gap-1.5">
                                        <Icon name="check" className="w-4 h-4 stroke-[3]" /> Cập nhật ngay
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* POP-UP: NHẬP PIN RESET KỲ KIỂM KÊ */}
                    {showResetModal && (
                        <div className="fixed inset-0 bg-navy/80 z-[400] flex items-center justify-center px-4 backdrop-blur-sm animate-in fade-in">
                            <div className="bg-white p-6 rounded-3xl w-full max-w-sm shadow-2xl scale-in-center">
                                <div className="w-16 h-16 bg-red/10 text-red rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="shield-alert" className="w-8 h-8" /></div>
                                <h3 className="text-center font-bold text-navy text-lg mb-2">Reset Kỳ Kiểm Kê</h3>
                                <p className="text-center text-slate text-sm mb-4">Hành động này sẽ xóa tiến độ trên Server. Vui lòng nhập mã PIN quản lý:</p>
                                <input 
                                    type="password" value={resetPin} onChange={(e) => { setResetPin(e.target.value); setResetError(''); }}
                                    className="w-full bg-sand/20 border border-blue/30 rounded-2xl p-4 text-center text-navy font-bold tracking-[0.5em] text-xl outline-none focus:ring-2 focus:ring-red mb-2"
                                    placeholder="• • • • •" autoFocus
                                />
                                {resetError && <p className="text-red text-xs font-bold text-center mb-4">{resetError}</p>}
                                <div className="flex gap-3 mt-2">
                                    <button onClick={() => setShowResetModal(false)} className="flex-1 py-3 rounded-xl font-bold text-navy bg-sand/30 hover:bg-sand/50">Hủy</button>
                                    <button onClick={confirmResetCampaign} className="flex-1 py-3 rounded-xl font-bold text-white bg-red hover:bg-darkred shadow-md">Xác nhận</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* HEADER CỐ ĐỊNH */}
                    <div className="bg-navy pt-6 pb-6 px-4 rounded-b-[2.5rem] shadow-lg sticky top-0 z-40">
                        <div className="max-w-md mx-auto">
                            <div className="flex justify-between items-center">
                                <h1 className="text-2xl font-bold text-sand tracking-tight flex items-center">
                                    <Icon name="clipboard-check" className="mr-2 w-6 h-6 text-gold"/> Kiểm Kê
                                </h1>
                                {isAuthenticated && (
                                    <div className="bg-white/10 px-3 py-1.5 rounded-xl flex items-center gap-2">
                                        <Icon name="user" className="w-3.5 h-3.5 text-gold" />
                                        <span className="text-xs font-bold text-sand">{staffName}</span>
                                    </div>
                                )}
                            </div>
                            
                            <div className="flex bg-white/10 p-1.5 rounded-2xl mt-5 relative">
                                {isFetchingGlobal && <div className="absolute top-1 right-2 text-gold"><Icon name="loader-2" className="w-3 h-3 animate-spin"/></div>}
                                <button onClick={() => setActiveTab('scan')} className={`flex-1 py-2 text-sm font-bold rounded-xl transition-all ${activeTab === 'scan' ? 'bg-gold text-navy shadow-sm' : 'text-sand hover:bg-white/5'}`}>Quét Mã</button>
                                <button onClick={() => setActiveTab('counted')} className={`flex-1 py-2 text-sm font-bold rounded-xl transition-all ${activeTab === 'counted' ? 'bg-white text-navy shadow-sm' : 'text-sand hover:bg-white/5'}`}>
                                    Chờ gửi ({scannedItems.length})
                                </button>
                                <button onClick={() => setActiveTab('uncounted')} className={`flex-1 py-2 text-sm font-bold rounded-xl transition-all ${activeTab === 'uncounted' ? 'bg-white text-navy shadow-sm' : 'text-sand hover:bg-white/5'}`}>
                                    Thiếu ({uncountedItems.length})
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-md mx-auto px-4 mt-6">
                        
                        {/* TAB 1: QUÉT MÃ CHÍNH */}
                        {}
                        {activeTab === 'scan' && (
                            <div className="space-y-4 animate-slide-up">
                                <SmartProductSearch 
                                    value={searchInput} onChange={setSearchInput} onManualSearch={handleManualSearch} onClear={handleClearSearch}
                                    masterProducts={masterProducts} onProductSelect={handleProductSelect} onScanClick={() => setIsScanning(true)}
                                />

                                {/* KÍCH HOẠT FULLSCREEN SCANNER Ở ĐÂY */}
                                {isScanning && (
                                    <FullscreenScanner 
                                        onScanSuccess={(code) => { 
                                            setSearchInput(code); 
                                            handleManualSearch(code); 
                                            setIsScanning(false);
                                        }} 
                                        onClose={() => setIsScanning(false)} 
                                    />
                                )}

                                {currentProduct && (
                                    <div className="bg-white rounded-3xl p-5 shadow-lg border border-navy/5 relative overflow-hidden animate-in fade-in">
                                        {globalStats.countedBarcodes?.includes(currentProduct.barcode) && (
                                            <div className="bg-blue/10 text-blue font-bold text-[10px] uppercase px-3 py-1.5 rounded-b-xl absolute top-0 left-1/2 -translate-x-1/2 flex items-center gap-1">
                                                <Icon name="check-circle-2" className="w-3 h-3"/> Đã có người đếm trên Server
                                            </div>
                                        )}
                                        <div className={`flex gap-4 items-center mb-5 pb-5 border-b border-sand/50 ${globalStats.countedBarcodes?.includes(currentProduct.barcode) ? 'mt-4' : ''}`}>
                                            <ProductAvatar url={currentProduct.imageUrl} />
                                            <div className="flex-1 min-w-0">
                                                <p className="font-bold text-navy text-lg leading-tight">{currentProduct.name}</p>
                                                <p className="text-xs text-slate mt-1 font-mono">{currentProduct.barcode}</p>
                                            </div>
                                        </div>

                                        <div className="space-y-4">
                                            <label className="text-sm font-bold text-navy block">Số lượng thực đếm trên kệ:</label>
                                            <input 
                                                type="number" value={actualQty} onChange={(e)=>setActualQty(e.target.value)} autoFocus
                                                className="w-full bg-sand/20 border-2 border-navy/10 rounded-2xl p-5 text-4xl font-black text-center text-navy outline-none focus:border-blue transition-colors" 
                                                placeholder="0" 
                                            />
                                            {/* STRICT BLIND COUNT: KHÔNG HIỆN THÔNG BÁO KHỚP/THIẾU/DƯ TẠI TAB NÀY */}
                                            <button 
                                                onClick={handleSaveCount} disabled={actualQty === ''}
                                                className={`w-full font-bold py-4 rounded-2xl text-lg flex items-center justify-center transition-all ${actualQty !== '' ? 'bg-navy text-sand shadow-lg hover:bg-slate' : 'bg-sand text-slate/50'}`}
                                            >
                                                XÁC NHẬN (LƯU LỘ TRÌNH)
                                            </button>
                                        </div>
                                    </div>
                                )}
                                
                                {/* SMART SHELF WIDGET: GỢI Ý ĐẾM NHANH TRÊN KỆ */}
                                {!currentProduct && smartShelfSuggestions.length > 0 && (
                                    <div className="mt-4 bg-navy/5 p-4 rounded-3xl border border-navy/10 animate-in fade-in">
                                        <div className="flex items-center justify-between mb-3 px-1">
                                            <h4 className="text-xs font-black text-navy uppercase tracking-wider flex items-center gap-1.5">
                                                <Icon name="sparkles" className="w-4 h-4 text-gold animate-pulse"/> Gợi ý sát bên kệ này:
                                            </h4>
                                            <span className="text-[10px] font-bold text-slate/50 bg-white px-2 py-0.5 rounded-full shadow-sm">AI Route</span>
                                        </div>
                                        <div className="grid grid-cols-1 gap-2">
                                            {smartShelfSuggestions.map((item, idx) => (
                                                <div key={idx} onClick={() => handleProductSelect(item)}
                                                    className="bg-white p-3 rounded-2xl shadow-sm border border-sand/60 flex items-center justify-between cursor-pointer hover:border-blue hover:shadow-md transition-all group"
                                                >
                                                    <div className="flex items-center gap-3 min-w-0 flex-1">
                                                        <ProductAvatar url={item.imageUrl} />
                                                        <div className="min-w-0 flex-1">
                                                            <p className="font-bold text-navy text-sm truncate group-hover:text-blue transition-colors">{item.name}</p>
                                                            <p className="text-[11px] font-mono text-slate/50 mt-0.5">SKU: {item.barcode}</p>
                                                        </div>
                                                    </div>
                                                    <div className="bg-sand/30 group-hover:bg-gold group-hover:text-navy text-navy/70 text-xs font-extrabold px-3 py-2 rounded-xl transition-all flex items-center gap-1 shrink-0 ml-2">
                                                        <span>Đếm tiếp</span><Icon name="arrow-right" className="w-3.5 h-3.5" />
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* BẢNG TIẾN ĐỘ THI ĐUA TỔNG */}
                                {!currentProduct && (
                                    <div className="mt-6 bg-white p-5 rounded-3xl shadow-sm border border-navy/5 relative overflow-hidden animate-in fade-in">
                                        <div className="flex justify-between items-center mb-3">
                                            <h4 className="text-xs font-bold text-navy/50 uppercase tracking-wider flex items-center gap-1">
                                                <Icon name="globe" className="w-3.5 h-3.5"/> Tiến độ tổng
                                            </h4>
                                            <button onClick={fetchGlobalProgress} disabled={isFetchingGlobal} className="text-navy/40 hover:text-navy transition-colors flex items-center gap-1 bg-sand/30 px-2 py-1 rounded-lg">
                                                <Icon name="refresh-cw" className={`w-3.5 h-3.5 ${isFetchingGlobal ? 'animate-spin text-gold' : ''}`} />
                                                <span className="text-[10px] font-bold">LÀM MỚI</span>
                                            </button>
                                        </div>
                                        <div className="flex justify-between items-end mb-2">
                                            <span className="text-3xl font-black text-navy">{countedSKU}<span className="text-sm text-slate/50 font-semibold ml-1">/{totalSKU} SKU</span></span>
                                            <span className="text-xl font-bold text-gold">{progressPct}%</span>
                                        </div>
                                        <div className="w-full h-3 bg-sand/50 rounded-full overflow-hidden mb-4">
                                            <div className="h-full bg-green transition-all duration-500 rounded-full relative" style={{ width: `${progressPct}%` }}>
                                                <div className="absolute inset-0 bg-white/20 w-full h-full -translate-x-full animate-[shimmer_2s_infinite]"></div>
                                            </div>
                                        </div>
                                        
                                        {staffStatsArray.length > 0 && (
                                            <div className="pt-4 border-t border-sand/50">
                                                <div className="flex justify-between items-center mb-2">
                                                    <p className="text-[10px] font-bold text-navy/40 uppercase">Bảng xếp hạng đóng góp</p>
                                                    <button onClick={() => { setShowResetModal(true); setResetPin(''); setResetError(''); }} className="text-[10px] font-bold text-red bg-red/10 px-2 py-1 rounded hover:bg-red/20 transition-colors">
                                                        Reset Kỳ Kiểm Kê
                                                    </button>
                                                </div>
                                                <div className="flex flex-wrap gap-2">
                                                    {staffStatsArray.map(([name, count], i) => (
                                                        <div key={name} className={`px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1.5 ${i === 0 ? 'bg-gold/20 text-navy border border-gold/30' : 'bg-sand/40 text-slate'}`}>
                                                            <Icon name={i === 0 ? "medal" : "user"} className={`w-3.5 h-3.5 ${i === 0 ? 'text-gold' : 'text-slate/50'}`} />
                                                            {name}: <span className="text-navy ml-0.5">{count}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* TAB 2: ĐÃ KIỂM KÊ (DỮ LIỆU CHỜ GỬI) */}
                        {}
                        {activeTab === 'counted' && (
                            <div className="space-y-3 animate-slide-up pb-10">
                                {scannedItems.length === 0 && <p className="text-center text-slate/50 mt-10 font-medium">Chưa có sản phẩm chờ gửi.</p>}
                                
                                {scannedItems.length > 0 && (
                                    <div className="bg-blue/10 p-4 rounded-2xl border border-blue/20 mb-4 flex justify-between items-center shadow-sm">
                                        <div>
                                            <p className="font-bold text-navy text-sm">Sẵn sàng gửi lên hệ thống</p>
                                            <p className="text-xs text-navy/70 mt-0.5">Đẩy dữ liệu nháp lên Server</p>
                                        </div>
                                        <button onClick={handleSyncToServer} disabled={isSyncing} className={`text-sand text-xs font-bold px-4 py-2.5 rounded-xl shadow-md transition-colors flex items-center gap-2 ${isSyncing ? 'bg-slate' : 'bg-navy hover:bg-slate'}`}>
                                            {isSyncing ? <Icon name="loader-2" className="w-4 h-4 animate-spin" /> : <Icon name="cloud-upload" className="w-4 h-4 text-gold" />}
                                            {isSyncing ? "ĐANG GỬI..." : "GỬI LÊN"}
                                        </button>
                                    </div>
                                )}

                                {scannedItems.map((item, idx) => {
                                    let badgeColor = "bg-green/10 text-green border-green/30";
                                    let badgeText = "ĐỦ HÀNG";
                                    if (item.statusBadge === 'THIẾU') {
                                        badgeColor = "bg-red/10 text-darkred border-red/30";
                                        badgeText = `THIẾU ${Math.abs(item.diff)}`;
                                    } else if (item.statusBadge === 'DƯ') {
                                        badgeColor = "bg-gold/20 text-navy border-gold/40";
                                        badgeText = `DƯ ${item.diff}`;
                                    } else if (item.statusBadge === 'CẦN CHECK LẠI') {
                                        badgeColor = "bg-red text-white font-black animate-pulse shadow-sm";
                                        badgeText = "⚠️ CẦN CHECK LẠI";
                                    }

                                    return (
                                        <div key={idx} className="bg-white p-4 rounded-2xl shadow-sm border border-navy/5 flex gap-3 items-center relative overflow-hidden">
                                            <div className={`absolute left-0 top-0 bottom-0 w-1.5 ${item.diff === 0 ? 'bg-green' : 'bg-red'}`}></div>
                                            <div className="flex-1 min-w-0 pl-2">
                                                <div className="flex justify-between items-start mb-1">
                                                    <p className="font-bold text-navy text-sm pr-2 leading-tight truncate">{item.name}</p>
                                                    <span className={`text-[11px] font-extrabold px-2.5 py-1 rounded-lg border shrink-0 ${badgeColor}`}>{badgeText}</span>
                                                </div>
                                                <p className="text-[10px] text-slate/60 font-mono tracking-tight mb-2 flex items-center gap-1">
                                                    <Icon name="clock" className="w-3 h-3 text-slate/40"/> {item.timestampStr}
                                                </p>
                                                <div className="flex items-center justify-between text-xs">
                                                    <p className="font-mono text-slate text-xs bg-sand/30 px-1.5 py-0.5 rounded text-slate/70">SKU: {item.barcode}</p>
                                                    <p className="text-navy font-bold bg-sand/50 px-3 py-1 rounded-lg">
                                                        Thực đếm: <span className="text-sm font-black">{item.actualQty}</span> 
                                                        <span className="text-[11px] text-slate/50 font-normal ml-1">(Máy: {item.systemQty})</span>
                                                    </p>
                                                </div>
                                            </div>
                                            <button onClick={() => handleEditScannedItem(item)} className="p-2 text-slate/40 hover:text-navy hover:bg-sand/30 rounded-xl transition-colors shrink-0" title="Đếm lại món này">
                                                <Icon name="pencil" className="w-5 h-5" />
                                            </button>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {/* TAB 3: CHƯA KIỂM KÊ */}
                        {}
                        {activeTab === 'uncounted' && (
                            <div className="space-y-3 animate-slide-up pb-10">
                                <div className="bg-blue/10 text-navy p-4 rounded-2xl mb-4 border border-blue/20 flex gap-3 shadow-sm">
                                    <Icon name="radar" className="shrink-0 text-blue mt-0.5" />
                                    <div className="text-xs font-medium">Hệ thống tự động loại trừ <b className="text-blue">{globalStats.countedBarcodes?.length || 0} sản phẩm</b> đã được kiểm đếm thành công trên Server.</div>
                                </div>
                                {sortedUncounted.slice(0, 50).map((item, idx) => (
                                    <div key={idx} onClick={() => { setActiveTab('scan'); handleManualSearch(item.barcode); }} className="bg-white p-4 rounded-2xl shadow-sm border border-navy/5 flex gap-4 items-center cursor-pointer hover:bg-sand/30 transition-colors">
                                        <ProductAvatar url={item.imageUrl} />
                                        <div className="flex-1 min-w-0">
                                            <p className="font-bold text-navy text-sm truncate">{item.name}</p>
                                            <p className="text-xs font-mono text-slate/50 mt-1">{item.barcode}</p>
                                        </div>
                                        <Icon name="chevron-right" className="text-slate/30 w-5 h-5" />
                                    </div>
                                ))}
                                {sortedUncounted.length > 50 && <p className="text-center text-xs text-slate/50 font-medium pt-4">... và {sortedUncounted.length - 50} sản phẩm khác (ẩn để giảm tải trình duyệt).</p>}
                            </div>
                        )}

                    </div>

                    {/* BOTTOM NAVIGATION */}
                    <div className="fixed bottom-6 w-full flex justify-center z-50 px-4 pointer-events-none">
                        <div className="bg-white/95 backdrop-blur-md shadow-[0_20px_40px_rgb(16,63,103,0.12)] rounded-3xl flex justify-around p-2 w-full max-w-md pointer-events-auto">
                            <button onClick={() => navigateTo('index.html')} className="flex flex-col items-center justify-center w-full py-3 rounded-2xl text-slate hover:bg-sand/30 transition-all"><Icon name="clock" className="h-5 w-5 mb-1" /><span className="text-[10px] font-bold tracking-wider">CẬN DATE</span></button>
                            <button onClick={() => navigateTo('index.html')} className="flex flex-col items-center justify-center w-full py-3 rounded-2xl text-slate hover:bg-sand/30 transition-all"><Icon name="shopping-cart" className="h-5 w-5 mb-1" /><span className="text-[10px] font-bold tracking-wider">ĐẶT HÀNG</span></button>
                            <button className="flex flex-col items-center justify-center w-full py-3 rounded-2xl bg-navy text-gold shadow-md transition-all"><Icon name="clipboard-check" className="h-5 w-5 mb-1" /><span className="text-[10px] font-bold tracking-wider">KIỂM KÊ</span></button>
                            <button onClick={() => navigateTo('index.html')} className="flex flex-col items-center justify-center w-full py-3 rounded-2xl text-slate hover:bg-sand/30 transition-all"><Icon name="layout-dashboard" className="h-5 w-5 mb-1" /><span className="text-[10px] font-bold tracking-wider">DASHBOARD</span></button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
