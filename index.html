            useEffect(() => {

                    fps: 15, 
                    qrbox: (viewfinderWidth, viewfinderHeight) => {
                        return {
                            width: Math.min(viewfinderWidth * 0.8, 280),
                            height: Math.min(viewfinderHeight * 0.6, 200)
                        };
                    },
                    formatsToSupport: formats 
                };

        const GaugeChart = ({ value, max, label, subLabelLeft, subLabelRight, color }) => {
            const percentage = max > 0 ? Math.min(value / max, 1) : 0;
            const cx = 100; const cy = 90; const r = 75; const strokeWidth = 24;
            const circumference = Math.PI * r;
            const strokeDashoffset = circumference - (percentage * circumference);
            
            let overlayClass = "";
            if (color === "#F0573A") overlayClass = "bg-red/10";
            if (color === "#103F67") overlayClass = "bg-navy/5";
            if (color === "#DAAF4F") overlayClass = "bg-gold/15";

            return (
                <div className="relative flex flex-col items-center p-6 rounded-3xl shadow-[0_8px_30px_rgb(16,63,103,0.05)] border border-navy/5 bg-white overflow-hidden">
                    <div className={`absolute inset-0 pointer-events-none ${overlayClass}`}></div>

                        <span className="font-extrabold uppercase tracking-wider text-sm block mb-1" style={{ color: color }}>{label}</span>

                    </div>
                    <div className="relative w-56 h-32 overflow-hidden flex justify-center z-10">
                        <svg className="w-full h-full drop-shadow-sm" viewBox="0 0 200 100">
                            <path d={`M ${cx - r} ${cy} A ${r} ${r} 0 0 1 ${cx + r} ${cy}`} fill="none" stroke="#F1F5F9" strokeWidth={strokeWidth} strokeLinecap="round" />
                            <path d={`M ${cx - r} ${cy} A ${r} ${r} 0 0 1 ${cx + r} ${cy}`} fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeDasharray={circumference} strokeDashoffset={strokeDashoffset} className="transition-all duration-1000 ease-out" />
                        </svg>
                        <div className="absolute bottom-1 flex flex-col items-center">
                            <span className="text-xl font-bold" style={{ color: color }}>{Math.round(percentage * 100)}%</span>
                        </div>
                    </div>

                        <div className="flex justify-between text-xs font-medium text-navy/80">
                            <span>{subLabelLeft}</span>
                            <span>{subLabelRight}</span>
                        </div>
                    </div>
                </div>
            );
        };

        const TIME_BUCKETS = ['90 ngày', '60 ngày', '45 ngày', '30 ngày', '15 ngày', '07 ngày', '0 ngày'];
        const getExpBucket = (days) => {
            if (days <= 0) return '0 ngày';
            if (days <= 7) return '07 ngày';
            if (days <= 15) return '15 ngày';
            if (days <= 30) return '30 ngày';
            if (days <= 45) return '45 ngày';
            if (days <= 60) return '60 ngày';
            return '90 ngày';
        };

        const AutocompleteNpp = ({ value, onChange, nppList, placeholder, inputClass, iconClass }) => {
            const [isOpen, setIsOpen] = useState(false);
            const wrapperRef = useRef(null);

            useEffect(() => {
                function handleClickOutside(event) {
                    if (wrapperRef.current && !wrapperRef.current.contains(event.target)) { setIsOpen(false); }
                }
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            const normalizeStr = (str) => str ? String(str).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '') : '';
            const filteredList = nppList.filter(n => {
                if (!value) return true;
                return normalizeStr(n).includes(normalizeStr(value));
            });

            return (
                <div ref={wrapperRef} className="relative w-full">
                    <input 
                        type="text" value={value} onChange={(e) => { onChange(e.target.value); setIsOpen(true); }}
                        onFocus={() => setIsOpen(true)} className={inputClass} placeholder={placeholder} 
                    />
                    <Icon name="search" className={iconClass} />
                    {isOpen && filteredList.length > 0 && (
                        <div className="absolute left-0 right-0 mt-2 bg-white rounded-2xl shadow-xl border border-sand/50 overflow-hidden z-[60] animate-in fade-in max-h-56 overflow-y-auto">
                            {filteredList.map((n, idx) => (

                                    className="p-4 hover:bg-sand/30 cursor-pointer border-b border-sand/10 transition-colors text-base font-semibold text-navy truncate"
                                >{n}</div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const SmartProductSearch = ({ value, onChange, onManualSearch, onClear, masterProducts, onProductSelect, onScanClick, isLoading }) => {
            const [suggestions, setSuggestions] = useState([]);
            const [isOpen, setIsOpen] = useState(false);
            const wrapperRef = useRef(null);

            useEffect(() => {
                function handleClickOutside(event) {
                    if (wrapperRef.current && !wrapperRef.current.contains(event.target)) { 
                        setIsOpen(false); 
                        if (value && value.trim() !== '' && onManualSearch) onManualSearch(value.trim());
                    }
                }
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, [value, onManualSearch]);

            const handleInputChange = (e) => {
                const val = e.target.value;
                onChange(val);
                if (val.trim() === '') { setSuggestions([]); setIsOpen(false); return; }

                const cleanVal = val.toLowerCase().trim();
                const filtered = masterProducts.filter(p => {
                    const nameStr = p.name ? String(p.name).toLowerCase() : '';
                    const bcStr = p.barcode ? String(p.barcode) : '';
                    return nameStr.includes(cleanVal) || bcStr.includes(cleanVal) || bcStr.slice(-6).includes(cleanVal);
                });

                setSuggestions(filtered.slice(0, 5));
                setIsOpen(true);
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    setIsOpen(false);
                    if (value && value.trim() !== '' && onManualSearch) onManualSearch(value.trim());
                }
            };

            const isInputFilled = value.trim().length > 0;

            return (
                <div ref={wrapperRef} className="relative w-full flex gap-2">
                    <div className="relative flex-1">
                        <input 
                            type="text" value={value} onChange={handleInputChange} onKeyDown={handleKeyDown}
                            onFocus={() => value && suggestions.length > 0 && setIsOpen(true)}
                            className="w-full bg-sand/20 border border-blue/30 rounded-2xl p-4 pr-12 text-base text-navy font-medium outline-none focus:ring-2 focus:ring-blue transition-all" 
                            placeholder="Quét mã vạch hoặc điền mã/tên..." 
                        />
                        {isInputFilled && (
                            <button type="button" onMouseDown={(e) => e.preventDefault()} onClick={() => { onChange(''); setIsOpen(false); if (onClear) onClear(); }}
                                className="absolute right-3 top-1/2 -translate-y-1/2 text-navy/30 hover:text-red transition-colors p-2" title="Xóa tìm kiếm"
                            >
                                <Icon name="x-circle" className="w-5 h-5" />
                            </button>

            const [activeReturnNppTab, setActiveReturnNppTab] = useState('');
            const [activeDiscountFilter, setActiveDiscountFilter] = useState('ALL');

                setIsLoading(true);

                    const response = await fetch(`${API_URL}?action=getDashboard`);
                    const result = await response.json();

                        setApiError(`Lỗi API: ${result.error}`);

                        setReturns(result.returns || []);
                        setDiscounts(result.discounts || []);

                        setArchivedOrders((result.orders || []).filter(o => o.status === 'Đã chốt'));

                } finally { setIsLoading(false); }
            };

                fetchDashboardData();
                const interval = setInterval(fetchDashboardData, 180000); 
                return () => clearInterval(interval);

            const groupedOrders = orders.reduce((acc, order) => {
                if (!acc[order.npp]) acc[order.npp] = []; 
                acc[order.npp].push(order); return acc;
            }, {});

            const sortedNppOrderTabs = Object.keys(groupedOrders).map(npp => ({
                npp, maxWait: Math.max(...groupedOrders[npp].map(o => o.hoursWait))
            })).sort((a, b) => b.maxWait - a.maxWait).map(x => x.npp);

                if (sortedNppOrderTabs.length > 0 && !sortedNppOrderTabs.includes(activeOrderNppTab) && activeOrderNppTab !== 'ARCHIVE') {

                acc[ret.npp].push(ret); return acc;
            }, {});

            useEffect(() => {
                const activeReturnNpps = Object.keys(groupedReturns);
                if (activeReturnNpps.length > 0 && !activeReturnNpps.includes(activeReturnNppTab)) {
                    setActiveReturnNppTab(activeReturnNpps[0]);
                } else if (activeReturnNpps.length === 0) { 
                    setActiveReturnNppTab(''); 
                }
            }, [filteredReturns]);

            const handleReturnStatus = (id, newStatus) => {
                setReturns(returns.map(r => r.id === id ? { ...r, status: newStatus } : r));
                addToSyncQueue({ action: "updateReturnStatus", id: id, status: newStatus });
            };

            const confirmDelete = (id, name, type) => { setItemToDelete({ id, name, type }); };

            const executeDelete = () => {
                if (!itemToDelete) return;
                if (itemToDelete.type === 'return') setReturns(returns.filter(r => r.id !== itemToDelete.id));
                else if (itemToDelete.type === 'discount') setDiscounts(discounts.filter(d => d.id !== itemToDelete.id));
                
                addToSyncQueue({ action: "deleteReturn", id: itemToDelete.id });
                showMsg("Đã xóa. Đang đồng bộ...", "success");
                setItemToDelete(null);
            };

            const executeMoveToDiscount = () => {
                if (!itemToMove) return;
                setReturns(returns.filter(r => r.id !== itemToMove.id)); // Ẩn khỏi bảng đổi trả ngay lập tức
                addToSyncQueue({ action: "moveToDiscount", id: itemToMove.id }); // Bắn API cập nhật
                
                showMsg("Đã chuyển sang bảng Giảm Giá!", "success");
                setItemToMove(null);
                setTimeout(fetchDashboardData, 2000); // Fetch lại data sau 2s để thấy SP hiện ở bảng dưới
            };
            
            const handleCloseOrders = (nppName) => {
                const ordersToArchive = orders.filter(o => o.npp === nppName).map(o => ({...o, status: 'Đã chốt'}));
                setOrders(orders.filter(o => o.npp !== nppName));
                setArchivedOrders([...ordersToArchive, ...archivedOrders]);
                addToSyncQueue({ action: "completeOrderNpp", npp: nppName });
                showMsg(`Đã chuyển đơn vào Lưu Trữ!`, "success");
            };

            const handleOrderQtyChange = (id, newQty, oldQty) => {
                if (newQty && newQty !== oldQty) {
                    setOrders(orders.map(o => o.id === id ? { ...o, qty: newQty, isEdited: true } : o));
                    addToSyncQueue({ action: "updateOrderQty", id: id, qty: newQty });
                }
            };

            const handleUpdateDiscount = (id, field, value) => {
                 setDiscounts(prev => prev.map(d => d.id === id ? { ...d, [field]: value, needsDailyUpdate: false } : d));
                 const currentItem = discounts.find(d => d.id === id);
                 const payloadToSync = { ...currentItem, [field]: value };
                 addToSyncQueue({ action: "updateDiscountRecord", id: id, qtyActual: payloadToSync.qtyActual, actualPct: payloadToSync.actualPct, isPromoApplied: payloadToSync.isPromoApplied });
            };

            const getWaitAlert = (hours) => {
                if (hours <= 8) return { bg: 'bg-green/10', text: 'text-green', border: 'border-green/20', icon: '🟢 An toàn', pulse: '' };
                if (hours <= 16) return { bg: 'bg-gold/20', text: 'text-darkred', border: 'border-gold/50', icon: '⏱️ Chú ý', pulse: '' };
                if (hours <= 24) return { bg: 'bg-red/10', text: 'text-red', border: 'border-red/50', icon: '⚠️ Trễ hạn', pulse: '' };
                return { bg: 'bg-darkred', text: 'text-white', border: 'border-darkred', icon: '🚨 KHẨN', pulse: 'animate-pulse shadow-[0_0_15px_rgba(185,32,37,0.5)]' };
            };

            const totalReturns = returns.length;
            const pendingReturns = returns.filter(r => r.status === 'Chờ xử lý').length;
            const processedReturns = totalReturns - pendingReturns;
            const totalDiscounts = discounts.length;
            const pendingDiscounts = discounts.filter(d => d.qtyActual === '' || d.needsDailyUpdate).length;
            const pendingOrdersCount = Object.keys(groupedOrders).length;

            const isDiscountPending = discounts.some(d => d.qtyActual === '' || d.needsDailyUpdate);

            const availableDiscountPcts = [...new Set(discounts.map(d => Number(d.actualPct)))].sort((a, b) => b - a);
            const filteredDiscounts = activeDiscountFilter === 'ALL' ? discounts : discounts.filter(d => Number(d.actualPct) === Number(activeDiscountFilter));

            if (!isAuthenticated) {
                return (
                    <div className="max-w-md mx-auto pt-32 px-4 min-h-screen flex flex-col items-center">
                        <div className="bg-white p-8 rounded-3xl shadow-sm border border-navy/5 w-full text-center relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-1 bg-gold"></div>
                            <div className="w-16 h-16 bg-navy/5 text-navy rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="lock" className="w-8 h-8" /></div>
                            <h2 className="text-2xl font-bold text-navy mb-2">Khu Vực Quản Lý</h2>
                            <form onSubmit={(e) => { e.preventDefault(); password === '56789' ? setIsAuthenticated(true) : setLoginError('Sai PIN'); }} className="space-y-4">
                                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="• • • • •" className="w-full bg-sand/20 border border-blue/30 rounded-2xl p-4 text-center text-navy font-bold tracking-[0.5em] text-xl outline-none focus:ring-2 focus:ring-blue" />
                                {loginError && <p className="text-red text-sm font-semibold">{loginError}</p>}
                                <button type="submit" className="w-full bg-navy hover:bg-slate text-sand font-bold py-4 rounded-2xl shadow-md">XÁC NHẬN</button>
                            </form>
                        </div>
                    </div>
                );
            }

            if(isLoading && discounts.length === 0) return <div className="h-screen flex items-center justify-center text-navy font-bold text-lg"><Icon name="loader-2" className="animate-spin mr-2 text-gold" /> Đang tải...</div>;
            const lockClass = isDiscountPending ? "opacity-30 pointer-events-none grayscale blur-[1px] transition-all duration-500" : "transition-all duration-500";

            return (
                <div className="max-w-5xl mx-auto pt-6 px-4 md:px-6 pb-28 animate-in fade-in relative">
                    <Toast message={msg.text} type={msg.type} />
                    
                    {/* Modal Xóa */}
                    {itemToDelete && (
                        <div className="fixed inset-0 bg-navy/80 z-[200] flex items-center justify-center px-4 backdrop-blur-sm animate-in fade-in">
                            <div className="bg-white p-6 rounded-3xl w-full max-w-sm shadow-2xl scale-in-center">
                                <div className="w-16 h-16 bg-red/10 text-red rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="alert-triangle" className="w-8 h-8" /></div>
                                <h3 className="text-center font-bold text-navy text-lg mb-2">Xác nhận Xóa</h3>
                                <p className="text-center text-slate text-sm mb-6">Bạn có chắc chắn muốn xóa vĩnh viễn <strong>{itemToDelete.name}</strong> khỏi danh sách {itemToDelete.type === 'return' ? 'Đổi Trả' : 'Giảm Giá'}?<br/><span className="text-red font-medium text-xs mt-2 block">Thao tác này sẽ xóa trực tiếp trên Google Sheets.</span></p>
                                <div className="flex gap-3">
                                    <button onClick={() => setItemToDelete(null)} className="flex-1 py-3 rounded-xl font-bold text-navy bg-sand/30 hover:bg-sand/50 transition-colors">Hủy</button>
                                    <button onClick={executeDelete} className="flex-1 py-3 rounded-xl font-bold text-white bg-red hover:bg-darkred transition-colors shadow-md shadow-red/20">Xóa Vĩnh Viễn</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Chuyển sang Giảm giá */}
                    {itemToMove && (
                        <div className="fixed inset-0 bg-navy/80 z-[200] flex items-center justify-center px-4 backdrop-blur-sm animate-in fade-in">
                            <div className="bg-white p-6 rounded-3xl w-full max-w-sm shadow-2xl scale-in-center">
                                <div className="w-16 h-16 bg-red/10 text-red rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="percent" className="w-8 h-8" /></div>
                                <h3 className="text-center font-bold text-navy text-lg mb-2">Đẩy qua Giảm Giá?</h3>
                                <p className="text-center text-slate text-sm mb-6">NPP không hỗ trợ đổi trả sản phẩm <strong>{itemToMove.name}</strong>?<br/>Hệ thống sẽ chuyển sản phẩm này sang bảng <strong>Giảm Giá</strong> để tính toán thanh lý.</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setItemToMove(null)} className="flex-1 py-3 rounded-xl font-bold text-navy bg-sand/30 hover:bg-sand/50 transition-colors">Hủy</button>
                                    <button onClick={executeMoveToDiscount} className="flex-1 py-3 rounded-xl font-bold text-white bg-red hover:bg-darkred transition-colors shadow-md shadow-red/20">Xác Nhận Đẩy</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="flex justify-between items-center mb-8">
                        <div>
                            <h1 className="text-3xl font-bold text-navy tracking-tight">ONE STOP <span className="font-light">| Operations</span></h1>
                            <p className="text-slate mt-1 font-medium">Trung tâm điều hành cửa hàng</p>
                        </div>
                        <button onClick={() => { fetchDashboardData(); showMsg("Đã làm mới!", "success"); }} className="bg-white p-3 rounded-full shadow-sm text-navy hover:bg-sand/50 transition-all flex items-center gap-2">
                            <Icon name="refresh-cw" className={`w-5 h-5 ${isLoading ? 'animate-spin text-gold' : ''}`} /><span className="text-sm font-bold hidden md:inline">Làm mới</span>
                        </button>
                    </div>

                    {isDiscountPending && (
                        <div className="mb-6 p-4 bg-gold/20 border border-gold/50 rounded-2xl text-navy font-bold flex items-start shadow-md animate-pulse">
                            <Icon name="shield-alert" className="mr-3 w-6 h-6 flex-shrink-0 text-gold" />
                            <div><p className="text-lg">KHÓA HỆ THỐNG ĐẦU NGÀY</p><p className="text-sm font-medium mt-1">Yêu cầu Quản lý điền đủ thông số "Tồn quầy hiện tại" ở bảng Hàng Cận Date bên dưới để mở khóa toàn bộ Dashboard.</p></div>
                        </div>
                    )}

                    <div className={`grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 ${lockClass}`}>
                        <GaugeChart value={totalDiscounts - pendingDiscounts} max={totalDiscounts} label="XỬ LÝ CẬN DATE & GIẢM GIÁ" subLabelLeft={`Đã KT: ${totalDiscounts - pendingDiscounts}`} subLabelRight={`Chưa KT: ${pendingDiscounts}`} color="#F0573A" />
                        <GaugeChart value={processedReturns} max={totalReturns} label="YÊU CẦU ĐỔI TRẢ" subLabelLeft={`Đã xử lý: ${processedReturns}`} subLabelRight={`Chờ: ${pendingReturns}`} color="#103F67" />
                        <GaugeChart value={archivedOrders.length} max={orders.length + archivedOrders.length} label="XỬ LÝ ĐẶT HÀNG" subLabelLeft={`Đã chốt: ${archivedOrders.length}`} subLabelRight={`Đang chờ: ${pendingOrdersCount}`} color="#DAAF4F" />
                    </div>

                    <div className="space-y-10">
                        <div className={`bg-white rounded-3xl shadow-md border-2 overflow-hidden relative transition-all ${isDiscountPending ? 'border-red ring-4 ring-red/20' : 'border-sand'}`}>
                            <div className="bg-[#F0573A] p-5 border-b flex justify-between items-center text-white">
                                <h2 className="font-bold flex items-center text-lg"><Icon name="alert-triangle" className="mr-3" /> THEO DÕI HÀNG CẬN DATE & ÁP DỤNG CHÍNH SÁCH GIẢM GIÁ</h2>
                                {isDiscountPending && <span className="text-xs font-bold text-red bg-white px-3 py-1.5 rounded-full uppercase shadow-sm">Bắt buộc cập nhật</span>}
                            </div>
                            
                            <div className="bg-sand/10 p-3 border-b border-sand/50 flex items-center gap-3 overflow-x-auto hide-scrollbar">
                                <div className="text-xs font-bold text-navy flex items-center gap-1 whitespace-nowrap"><Icon name="filter" className="w-4 h-4"/> Lọc % Giảm giá:</div>
                                <button onClick={() => setActiveDiscountFilter('ALL')} className={`px-3 py-1.5 rounded-xl text-xs font-bold transition-all whitespace-nowrap ${activeDiscountFilter === 'ALL' ? 'bg-navy text-sand shadow-md' : 'bg-white text-navy border border-blue/20 hover:bg-sand/50'}`}>Tất cả</button>
                                {availableDiscountPcts.map(pct => (
                                    <button key={pct} onClick={() => setActiveDiscountFilter(pct)} className={`px-3 py-1.5 rounded-xl text-xs font-bold transition-all whitespace-nowrap ${activeDiscountFilter === pct ? 'bg-gold text-navy shadow-md' : 'bg-white text-navy border border-blue/20 hover:bg-sand/50'}`}>
                                        Giảm {pct}% <span className="ml-1 px-1.5 py-0.5 bg-white/30 rounded-md text-[10px]">{discounts.filter(d=>Number(d.actualPct)===pct).length}</span>
                                    </button>
                                ))}
                            </div>

                            <div className="p-0 overflow-x-auto">
                                <table className="w-full text-sm text-left border-collapse min-w-[800px]">
                                    <thead className="bg-sand/30 text-slate">
                                        <tr>
                                            <th className="p-4 font-semibold uppercase text-[11px]">Sản phẩm & Date</th>
                                            <th className="p-4 font-semibold uppercase text-[11px] text-center w-28">Gợi ý % Giảm giá</th>
                                            <th className="p-4 font-semibold uppercase text-[11px] text-center w-36">% Giảm Giá Chính Sách</th>
                                            <th className="p-4 font-semibold uppercase text-[11px] text-center w-36">Tồn quầy hiện tại</th>
                                            <th className="p-4 font-semibold uppercase text-[11px] text-center w-32">Khuyến mãi & Thao tác</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-sand/50">
                                        {filteredDiscounts.length === 0 && (
                                            <tr><td colSpan="5" className="p-8 text-center text-slate/50 font-medium">Không có dữ liệu trong nhóm này.</td></tr>
                                        )}
                                        {filteredDiscounts.map(d => {
                                            const isZeroAndPromoOn = d.qtyActual == 0 && d.qtyActual !== '' && d.isPromoApplied;
                                            const needUpdate = d.qtyActual === '' || d.needsDailyUpdate;
                                            let rowClass = `transition-all duration-500 border-l-4 border-transparent hover:bg-sand/10 `;
                                            if (isZeroAndPromoOn) rowClass = `bg-red/10 border-l-4 border-l-red relative`;
                                            else if (needUpdate) rowClass += ` bg-red/5`;

                                            return (
                                                <tr key={d.id} className={rowClass}>
                                                    <td className="p-4 flex flex-col justify-center">
                                                        <div className="flex items-center gap-3">
                                                            <ProductAvatar url={d.imageUrl} />
                                                            <div>
                                                                <p className={`font-bold text-base ${isZeroAndPromoOn ? 'text-darkred' : 'text-navy'}`}>{d.name}</p>
                                                                <p className="text-xs font-mono text-slate/70 mt-0.5">SKU: {d.barcode}</p>
                                                                <p className="text-sm font-medium text-red mt-0.5">Còn {d.daysLeft} ngày <span className="text-blue mx-2">|</span> Số lượng tồn: {d.qtyActual !== '' ? d.qtyActual : d.qtyOriginal}</p>
                                                            </div>
                                                        </div>
                                                        {isZeroAndPromoOn && (
                                                            <div className="mt-4 p-3 bg-darkred text-white text-xs sm:text-sm font-bold rounded-xl border-2 border-red animate-pulse flex items-center gap-3 shadow-[0_0_15px_rgba(185,32,37,0.6)]">
                                                                <div className="bg-white/20 p-1.5 rounded-lg shrink-0"><Icon name="power-off" className="w-5 h-5" /></div>
                                                                SẢN PHẨM ĐÃ BÁN HẾT! VUI LÒNG TẮT KHUYẾN MÃI TRÊN POS.
                                                            </div>
                                                        )}
                                                    </td>
                                                    <td className={`p-4 text-center font-bold text-slate/40 text-lg ${isZeroAndPromoOn ? 'blur-[2px] opacity-40 pointer-events-none' : ''}`}>{d.suggestPct}%</td>
                                                    <td className={`p-4 text-center ${isZeroAndPromoOn ? 'blur-[2px] opacity-40 pointer-events-none' : ''}`}>
                                                        <input type="number" defaultValue={d.actualPct} onBlur={(e) => handleUpdateDiscount(d.id, 'actualPct', e.target.value)} className="w-20 text-center border border-blue/30 rounded-xl p-3 font-bold text-navy bg-sand/20 outline-none focus:ring-2 focus:ring-gold" />
                                                    </td>
                                                    <td className={`p-4 text-center relative ${isZeroAndPromoOn ? 'blur-[2px] opacity-40 pointer-events-none' : ''}`}>
                                                        <input type="number" defaultValue={d.qtyActual} onBlur={(e) => handleUpdateDiscount(d.id, 'qtyActual', e.target.value)} className={`w-full text-center border-2 rounded-xl p-3 font-bold text-lg outline-none focus:ring-2 ${needUpdate ? 'border-red/50 bg-red/10 text-darkred' : d.qtyActual == 0 ? 'border-sand bg-sand/50 text-navy/30' : 'border-green/50 bg-green/10 text-green'}`} placeholder="Nhập..." />
                                                        {d.needsDailyUpdate && d.qtyActual !== '' && <p className="absolute left-0 w-full text-[10px] text-red mt-1 font-bold text-center">Xác nhận lại hôm nay</p>}
                                                    </td>
                                                    <td className="p-4 text-center relative z-20">
                                                        <div className="flex flex-col items-center justify-center gap-3">
                                                            <div>
                                                                <button onClick={() => handleUpdateDiscount(d.id, 'isPromoApplied', !d.isPromoApplied)} className={`w-12 h-6 rounded-full relative transition-colors duration-300 mx-auto block ${d.isPromoApplied ? 'bg-green' : 'bg-slate/30'} ${isZeroAndPromoOn ? 'ring-4 ring-red/50 shadow-lg' : ''}`}>
                                                                    <div className={`w-5 h-5 bg-white rounded-full absolute top-0.5 transition-transform duration-300 shadow-sm ${d.isPromoApplied ? 'translate-x-6' : 'translate-x-1'}`}></div>
                                                                </button>
                                                                <span className={`text-[10px] font-bold mt-2 block ${d.isPromoApplied ? 'text-green' : 'text-slate/50'}`}>{d.isPromoApplied ? 'Đã chạy' : 'Chưa chạy'}</span>
                                                            </div>
                                                            <button onClick={() => confirmDelete(d.id, d.name, 'discount')} className="bg-red/10 text-red hover:bg-red hover:text-white p-1.5 rounded-lg transition-colors border border-red/20" title="Xóa dữ liệu">
                                                                <Icon name="trash-2" className="w-4 h-4" />
                                                            </button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div className={`bg-white rounded-3xl shadow-sm border border-navy/5 overflow-hidden ${lockClass}`}>
                            <div className="bg-navy p-5 text-sand flex justify-between items-center">
                                <h2 className="font-semibold flex items-center"><Icon name="refresh-ccw" className="mr-3 text-gold" /> QUẢN LÝ ĐỔI TRẢ</h2>
                                <span className="bg-gold text-navy font-bold text-xs px-3 py-1.5 rounded-full">{totalReturns} Yêu cầu</span>
                            </div>
                            
                            <div className="p-5 space-y-4">
                                <div className="flex gap-2 overflow-x-auto pb-4 mb-2 border-b border-sand/50 hide-scrollbar">
                                    {TIME_BUCKETS.map(bucket => {
                                        const count = returns.filter(r => getExpBucket(r.daysLeft) === bucket).length;
                                        return (
                                            <button key={bucket} onClick={() => setActiveReturnTimeTab(bucket)} className={`px-4 py-2 text-sm font-bold rounded-xl transition-all whitespace-nowrap flex items-center gap-2 border-2 ${activeReturnTimeTab === bucket ? 'border-navy bg-navy text-sand shadow-md' : 'border-sand/50 bg-white text-slate hover:border-navy/30'}`}>
                                                {bucket} <span className={`px-2 py-0.5 rounded-lg text-xs ${activeReturnTimeTab === bucket ? 'bg-gold text-navy' : 'bg-sand text-navy'}`}>{count}</span>
                                            </button>
                                        );
                                    })}
                                </div>

                                {Object.keys(groupedReturns).length > 0 && (
                                    <div className="flex gap-2 overflow-x-auto pb-2 hide-scrollbar">
                                        {Object.keys(groupedReturns).map(nppName => (
                                            <button key={nppName} onClick={() => setActiveReturnNppTab(nppName)} className={`px-4 py-2 text-xs font-bold rounded-full transition-all whitespace-nowrap flex items-center gap-2 ${activeReturnNppTab === nppName ? 'bg-navy text-sand shadow-sm' : 'bg-sand/30 hover:bg-sand/50 text-navy'}`}>
                                                {nppName} <span className={`px-2 py-0.5 rounded-full text-[10px] ${activeReturnNppTab === nppName ? 'bg-gold text-navy' : 'bg-navy/10 text-navy'}`}>{groupedReturns[nppName].length}</span>
                                            </button>
                                        ))}
                                    </div>
                                )}

                                {activeReturnNppTab && groupedReturns[activeReturnNppTab] && (
                                    <div className="overflow-x-auto border border-sand rounded-2xl animate-in fade-in">
                                        <table className="w-full text-sm text-left border-collapse">
                                            <thead className="bg-sand/30 text-slate">
                                                <tr>
                                                    <th className="p-4 font-semibold uppercase text-[11px]">Sản phẩm</th>
                                                    <th className="p-4 font-semibold uppercase text-[11px] text-center">SL</th>
                                                    <th className="p-4 font-semibold uppercase text-[11px] text-center w-36">Trạng thái</th>
                                                    <th className="p-4 font-semibold uppercase text-[11px] w-48 text-right">Ghi chú & Thao tác</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-sand/50">
                                                {groupedReturns[activeReturnNppTab].map(r => (
                                                    <tr key={r.id} className="hover:bg-sand/10">
                                                        <td className="p-4 flex items-center gap-3">
                                                            <ProductAvatar url={r.imageUrl} />
                                                            <div>
                                                                <p className="font-bold text-navy">{r.name}</p>
                                                                <p className="font-mono text-slate text-xs mt-0.5">SKU: {r.barcode}</p>
                                                            </div>
                                                        </td>
                                                        <td className="p-4 text-center font-bold text-navy text-lg">{r.qty}</td>
                                                        <td className="p-4 text-center">
                                                            <select value={r.status} onChange={(e) => handleReturnStatus(r.id, e.target.value)} className={`text-xs font-bold rounded-xl px-3 py-2 outline-none border w-full text-center cursor-pointer ${r.status === 'Chờ xử lý' ? 'bg-white border-blue text-slate' : r.status === 'Đã báo NPP' ? 'bg-blue/10 border-blue/30 text-navy' : 'bg-green/10 border-green/30 text-green'}`}>
                                                                <option value="Chờ xử lý">Chờ xử lý</option>
                                                                <option value="Đã báo NPP">Đã báo NPP</option>
                                                                <option value="Từ chối đổi">Từ chối đổi</option>
                                                                <option value="Đã nhận đổi">Đã nhận đổi</option>
                                                            </select>
                                                        </td>
                                                        <td className="p-4 text-right">
                                                            <div className="flex items-center justify-end gap-2">
                                                                <input type="text" placeholder="Ghi chú..." defaultValue={r.note} className="border border-blue/20 bg-white rounded-lg px-3 py-2 text-xs w-full max-w-[120px] outline-none" />
                                                                
                                                                <button onClick={() => setItemToMove({id: r.id, name: r.name})} className="bg-red/10 text-red hover:bg-red hover:text-white p-2 rounded-lg transition-colors border border-red/20" title="Chuyển sang Giảm Giá">
                                                                    <Icon name="percent" className="w-4 h-4" />
                                                                </button>
                                                                
                                                                <button onClick={() => confirmDelete(r.id, r.name, 'return')} className="bg-red/10 text-red hover:bg-red hover:text-white p-2 rounded-lg transition-colors border border-red/20" title="Xóa dữ liệu">
                                                                    <Icon name="trash-2" className="w-4 h-4" />
                                                                </button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className={`bg-white rounded-3xl shadow-sm border border-navy/5 overflow-hidden ${lockClass}`}>
                            <div className="bg-navy p-5 text-sand flex justify-between items-center">
                                <h2 className="font-semibold flex items-center"><Icon name="shopping-cart" className="mr-3 text-gold" /> XỬ LÝ ĐẶT HÀNG</h2>
                                <span className="bg-gold text-navy font-bold text-xs px-3 py-1.5 rounded-full">{orders.length} Chờ xử lý</span>
                            </div>

                            <div className="p-5 space-y-4">
                                <div className="flex gap-2 overflow-x-auto pb-2 hide-scrollbar border-b border-sand/50">
                                    {sortedNppOrderTabs.map(nppName => {
                                        const maxWait = Math.max(...groupedOrders[nppName].map(o => o.hoursWait));
                                        const alertStyle = getWaitAlert(maxWait);
                                        return (
                                            <button key={nppName} onClick={() => setActiveOrderNppTab(nppName)} className={`px-4 py-2 text-xs font-bold rounded-full transition-all whitespace-nowrap flex items-center gap-2 border border-transparent ${activeOrderNppTab === nppName ? `bg-navy text-sand shadow-lg ${alertStyle.pulse}` : `bg-sand/30 hover:bg-sand/50 text-navy ${alertStyle.border}`}`}>
                                                <span className="text-[10px]">{alertStyle.icon.split(' ')[0]}</span> {nppName}
                                                <span className={`px-2 py-0.5 rounded-full text-[10px] ${activeOrderNppTab === nppName ? 'bg-gold text-navy' : 'bg-white shadow-sm text-navy'}`}>{groupedOrders[nppName].length}</span>
                                            </button>
                                        );
                                    })}
                                    
                                    <div className="w-px bg-sand mx-1 shrink-0"></div>
                                    
                                    <button onClick={() => setActiveOrderNppTab('ARCHIVE')} className={`px-4 py-2 text-xs font-bold rounded-full transition-all whitespace-nowrap shrink-0 flex items-center gap-2 border-2 border-dashed ${activeOrderNppTab === 'ARCHIVE' ? 'bg-navy text-sand border-navy' : 'bg-white text-slate border-slate/30'}`}>
                                        LƯU TRỮ
                                        <span className={`px-2 py-0.5 rounded-full text-[10px] ${activeOrderNppTab === 'ARCHIVE' ? 'bg-gold text-navy' : 'bg-slate/10 text-slate'}`}>{archivedOrders.length}</span>
                                    </button>
                                </div>

                                {activeOrderNppTab === 'ARCHIVE' ? (
                                    <div className="overflow-x-auto border border-dashed border-slate/30 rounded-2xl animate-in fade-in bg-slate/5">
                                        <table className="w-full text-sm text-left border-collapse opacity-70">
                                            <thead className="text-slate/60">
                                                <tr><th className="p-4 font-semibold uppercase text-[11px]">Sản phẩm đã chốt (Tự động xóa sau 7 ngày)</th><th className="p-4 font-semibold uppercase text-[11px] text-center w-24">Đã chốt</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate/10">
                                                {archivedOrders.map(item => (
                                                    <tr key={item.id}>
                                                        <td className="p-4 flex items-center gap-3">
                                                            <ProductAvatar url={item.imageUrl} />
                                                            <div><p className="font-bold text-navy">{item.name}</p><p className="text-[10px] text-slate">{item.npp}</p></div>
                                                        </td>
                                                        <td className="p-4 text-center font-bold text-navy bg-white/50">{item.qty}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                ) : activeOrderNppTab && groupedOrders[activeOrderNppTab] ? (
                                    <div className="space-y-4 animate-in fade-in">
                                        <div className="flex justify-between items-center bg-sand/10 p-3 rounded-2xl border border-sand">
                                            <div>
                                                <p className="text-xs text-slate font-medium">Nhà phân phối đang xem:</p>
                                                <h3 className="font-bold text-navy text-sm">{activeOrderNppTab}</h3>
                                            </div>
                                            <button onClick={() => handleCloseOrders(activeOrderNppTab)} className="bg-navy hover:bg-slate text-sand text-xs font-bold px-4 py-2.5 rounded-xl shadow-sm flex items-center gap-2 transition-colors">
                                                <Icon name="check-circle-2" className="text-gold w-4 h-4" /> Xác nhận đã chốt đơn
                                            </button>
                                        </div>

                                        <div className="overflow-x-auto border border-sand rounded-2xl">
                                            <table className="w-full text-sm text-left border-collapse">
                                                <thead className="bg-sand/30 text-slate">
                                                    <tr>
                                                        <th className="p-4 font-semibold uppercase text-[11px]">Sản phẩm</th>
                                                        <th className="p-4 font-semibold uppercase text-[11px] text-center w-32">Chờ xử lý</th>
                                                        <th className="p-4 font-semibold uppercase text-[11px] text-center w-32">Số lượng đặt</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-sand/50">
                                                    {groupedOrders[activeOrderNppTab].map(item => {
                                                        const alertStyle = getWaitAlert(item.hoursWait);
                                                        return (
                                                            <tr key={item.id} className="hover:bg-sand/10">
                                                                <td className="p-4 flex items-center gap-3">
                                                                    <ProductAvatar url={item.imageUrl} />
                                                                    <div>
                                                                        <p className="font-bold text-navy">{item.name}</p>
                                                                        <p className="font-mono text-slate text-xs mt-0.5">SKU: {item.barcode}</p>
                                                                    </div>
                                                                </td>
                                                                <td className="p-4 text-center">
                                                                    <span className={`inline-block text-xs font-bold px-3 py-1.5 rounded-xl border ${alertStyle.bg} ${alertStyle.text} ${alertStyle.border} ${alertStyle.pulse}`}>
                                                                        {item.hoursWait}h ({alertStyle.icon.split(' ')[1]})
                                                                    </span>
                                                                </td>
                                                                <td className="p-4 text-center">
                                                                    <input 
                                                                        type="number" 
                                                                        defaultValue={item.qty} 
                                                                        onBlur={(e) => handleOrderQtyChange(item.id, e.target.value, item.qty)}
                                                                        className={`w-20 text-center text-lg font-black bg-transparent border-b-2 outline-none pb-1 transition-colors ${item.isEdited ? 'text-green border-green' : 'text-slate/60 border-slate/20 hover:border-blue'}`} 
                                                                        title="Nhấp để sửa số lượng thực tế"
                                                                    />
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                ) : null}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const SyncIndicator = ({ current, total }) => {
            if (total === 0) return null;
            return (
                <div className="fixed top-4 right-4 z-[150] bg-navy/90 backdrop-blur text-gold px-4 py-2 rounded-full shadow-lg flex items-center gap-2 text-xs font-bold animate-in fade-in">
                    <Icon name="cloud-upload" className="w-4 h-4 animate-bounce" />
                    Đang đồng bộ: {Math.min(current + 1, total)}/{total}
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('candate');
            const [locallyUploadedImages, setLocallyUploadedImages] = useState({});
            
            const [masterProducts, setMasterProducts] = useState(() => {
                const cached = localStorage.getItem('ONE_STOP_PRODUCTS_CACHE');
                return cached ? JSON.parse(cached).products || [] : [];
            }); 

            useEffect(() => {
                const loadProductsForToday = async () => {
                    const todayStr = new Date().toISOString().split('T')[0]; 
                    const localDataString = localStorage.getItem('ONE_STOP_PRODUCTS_CACHE');
                    
                    if (localDataString) {
                        const localData = JSON.parse(localDataString);
                        if (localData.date === todayStr && localData.products) {
                            setMasterProducts(localData.products); 
                            return; 
                        }
                    }

                    try {
                        const response = await fetch(`${API_URL}?action=getAllProducts`);
                        const dataFromAPI = await response.json();
                        
                        if (dataFromAPI && dataFromAPI.products) {
                            const dataToSave = {
                                date: todayStr,
                                products: dataFromAPI.products
                            };
                            localStorage.setItem('ONE_STOP_PRODUCTS_CACHE', JSON.stringify(dataToSave));
                            setMasterProducts(dataFromAPI.products);
                        }
                    } catch (error) {
                        if (localDataString) {
                            setMasterProducts(JSON.parse(localDataString).products);
                        }
                    }
                };
                
                loadProductsForToday();
            }, []);
            
            const [syncQueue, setSyncQueue] = useState([]);
            const [syncTotal, setSyncTotal] = useState(0);
            const [syncProcessed, setSyncProcessed] = useState(0);
            const isSyncingRef = useRef(false);

            useEffect(() => {
                if (syncQueue.length === 0) { setSyncTotal(0); setSyncProcessed(0); }
            }, [syncQueue]);

            useEffect(() => {
                const handleBeforeUnload = (e) => {
                    if (syncQueue.length > 0) { const message = 'Hệ thống đang được đồng bộ, đề nghị bạn không tắt đi.'; e.preventDefault(); e.returnValue = message; return message; }
                };
                window.addEventListener('beforeunload', handleBeforeUnload);
                return () => window.removeEventListener('beforeunload', handleBeforeUnload);
            }, [syncQueue]);

            useEffect(() => {
                if (syncQueue.length === 0 || isSyncingRef.current) return;
                const processNext = async () => {
                    isSyncingRef.current = true;
                    const currentItem = syncQueue[0];
                    try {
                        await fetch(API_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(currentItem.payload) });
                        setSyncProcessed(prev => prev + 1);
                        setSyncQueue(prev => prev.filter(item => item.id !== currentItem.id));
                    } catch (error) {
                        await new Promise(res => setTimeout(res, 3000));
                        setSyncQueue(prev => { const newQ = [...prev.filter(item => item.id !== currentItem.id), currentItem]; return newQ; });
                    } finally { isSyncingRef.current = false; }
                };
                processNext();
            }, [syncQueue]);

            const addToSyncQueue = (payload) => {
                const newItem = { id: Date.now() + Math.random().toString(), payload };
                setSyncQueue(prev => {
                    if (prev.length === 0) { setSyncTotal(1); setSyncProcessed(0); } else { setSyncTotal(t => t + 1); }
                    return [...prev, newItem];
                });
            };

            const updateLocalCache = (barcode, name, npp, imageUrl) => {
                setMasterProducts(prev => {
                    let newProducts = [...prev];
                    const idx = newProducts.findIndex(p => String(p.barcode) === String(barcode));
                    if (idx >= 0) {
                        newProducts[idx] = { 
                            ...newProducts[idx], 
                            name: name || newProducts[idx].name,
                            npp: npp || newProducts[idx].npp,
                            imageUrl: imageUrl || newProducts[idx].imageUrl
                        };
                    } else {
                        newProducts.unshift({ barcode, name, npp, imageUrl: imageUrl || '' });
                    }
                    localStorage.setItem('ONE_STOP_PRODUCTS_CACHE', JSON.stringify({
                        date: new Date().toISOString().split('T')[0],
                        products: newProducts
                    }));
                    return newProducts;
                });
            };

            return (
                <div className="bg-sand min-h-screen font-sans pb-20">
                    <SyncIndicator current={syncProcessed} total={syncTotal} />
                    <div className="w-full">
                        {activeTab === 'candate' && <ViewCanDate addToSyncQueue={addToSyncQueue} masterProducts={masterProducts} updateLocalCache={updateLocalCache} />}
                        {activeTab === 'dathang' && <ViewDatHang locallyUploadedImages={locallyUploadedImages} setLocallyUploadedImages={setLocallyUploadedImages} addToSyncQueue={addToSyncQueue} masterProducts={masterProducts} updateLocalCache={updateLocalCache} />}
                        {activeTab === 'dashboard' && <ViewDashboard addToSyncQueue={addToSyncQueue} />}
                    </div>
                    <div className="fixed bottom-6 w-full flex justify-center z-50 px-4 pointer-events-none">
                        <div className="bg-white/90 backdrop-blur-md shadow-[0_20px_40px_rgb(16,63,103,0.12)] rounded-3xl flex justify-around p-2 w-full max-w-md pointer-events-auto">
                            <button onClick={() => setActiveTab('candate')} className={`flex flex-col items-center justify-center w-full py-3 rounded-2xl transition-all ${activeTab === 'candate' ? 'bg-navy text-gold shadow-md' : 'text-slate hover:bg-sand/30'}`}><Icon name="clock" className="h-5 w-5 mb-1" /><span className="text-[10px] font-bold tracking-wider">CẬN DATE</span></button>
                            <button onClick={() => setActiveTab('dathang')} className={`flex flex-col items-center justify-center w-full py-3 rounded-2xl transition-all ${activeTab === 'dathang' ? 'bg-navy text-gold shadow-md' : 'text-slate hover:bg-sand/30'}`}><Icon name="shopping-cart" className="h-5 w-5 mb-1" /><span className="text-[10px] font-bold tracking-wider">ĐẶT HÀNG</span></button>
                            
                            <button onClick={() => window.location.href='kiem-ke.html'} className="flex flex-col items-center justify-center w-full py-3 rounded-2xl transition-all text-slate hover:bg-sand/30">
                                <Icon name="clipboard-check" className="h-5 w-5 mb-1" />
                                <span className="text-[10px] font-bold tracking-wider">KIỂM KÊ</span>
                            </button>
                            
                            <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center justify-center w-full py-3 rounded-2xl transition-all ${activeTab === 'dashboard' ? 'bg-navy text-gold shadow-md' : 'text-slate hover:bg-sand/30'}`}><Icon name="layout-dashboard" className="h-5 w-5 mb-1" /><span className="text-[10px] font-bold tracking-wider">DASHBOARD</span></button>
                        </div>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
