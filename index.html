            "PHƯỚC TÀI - CJ FOOD", "NPP MAYORA", "THỰC PHẨM G KITCHEN", "THU MUA - ONE STOP", "CHUỖI DV 60S", "THÁI MỸ HƯƠNG - COCOXIM", 
            "NGUYÊN MINH HOÀNG - UNILEVER", "TOPCOCO DAVIFOOD - HUY HOÀNG GIA", "NPP HƯƠNG TRÀ", "NPP SC NẾP CẨM - BÁCH HOA", 
            "VN POSTCARDS - MONO CONCEPT", "HƯƠNG BÌNH - PRINGLES", "QUỐC TẾ HẢI THIÊN", "NGON NGON", "NCC TÚI VẢI CANVAS", 
            "CTY VINEYARD", "Hội An Salaisons / Les Artisans d’Indochine", "NCC THUỐC LÁ - TL SÀI GÒN", "CTY TNHH COOBEE VN", 
            "CTY TNHH YAKULT", "NCC BIA - HOÀNG MẠNH NAM (1664, BUD, CORONA)", "CTY TNHH DAEWOO INNOVATION - G4YOU", "NCC SOUVENIRS - AMLT", 
            "NCC THUỐC LÁ - THANH CHƯƠNG", "NCC BAO BÌ - VĂN SAN", "NCC - HẢI GIA CÁT", "NCC NUTZIE", "NCC - SANNY SOUVENIR", 
            "CHOCOLATE ALLUVIA", "NPP KỲ TIÊN - KIDO'S", "NPP TM TOÀN LÊ GIA", "NCC SOUVENIRS - NGỌT STUDIO", 
            "NCC RƯỢU - THE LOCAL DISTILLERY DA NANG WHISKEY", "CTY CP CÔNG NGHỆ DAVIFOOD VN", "THU MUA - NGUYÊN NGUYỄN", 
            "BIA NHÀ BREWHOUSE & TAPROOM", "NCC RƯỢU VANG - CTY TNHH TM THIÊN LINH", "CTY TNHH S.E.A CRAFT BREW TRADING (EAST WEST)", 
            "NPP HUY TÍN - SG FOOD", "CTY TNHH EVRA ORIENT TRADING (SAIGON SPIRITS)", "NPP MỸ PHƯƠNG PHÁT", "CTY TNHH BANH TAI THONG", 
            "CTY TNHH TM DV MAGNOLIA VN (TOUCAN)", "CTY TNHH MEGA MARKET", "NCC TRÌNH COFFEE", "NCC - NGHIÊM TRẦN LAFOOCO",

        ];

        // --- COMPONENT: AN TOÀN CHO LUCIDE ICON ---
        const Icon = ({ name, className = '' }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    ref.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    window.lucide.createIcons({ root: ref.current });
                }
            }, [name, className]);
            return <span ref={ref} style={{ display: 'contents' }}></span>;
        };

        const Toast = ({ message, type }) => {
            if (!message) return null;
            const bg = type === 'error' ? 'bg-red text-white' : type === 'warning' ? 'bg-gold text-navy' : 'bg-green text-white';
            return (
                <div className={`fixed top-4 left-1/2 transform -translate-x-1/2 z-[150] px-6 py-3 rounded-full shadow-lg text-sm font-bold toast-message whitespace-nowrap ${bg}`}>
                    {message}
                </div>
            );
        };

        // --- COMPONENT QUÉT MÃ VẠCH (CAMERA) ---
        const BarcodeScanner = ({ onScanSuccess, onClose }) => {
            useEffect(() => {
                const html5QrcodeScanner = new Html5QrcodeScanner(
                    "reader",
                    { fps: 10, qrbox: {width: 250, height: 150}, aspectRatio: 1.0 },
                    /* verbose= */ false
                );

                html5QrcodeScanner.render((decodedText) => {
                    html5QrcodeScanner.clear();
                    onScanSuccess(decodedText);
                }, (error) => {});

                return () => {
                    html5QrcodeScanner.clear().catch(error => console.error("Failed to clear scanner", error));
                };
            }, [onScanSuccess]);

            return (
                <div className="fixed inset-0 bg-navy/90 z-[100] flex flex-col items-center justify-center px-4 backdrop-blur-sm">
                    <div className="bg-white p-4 rounded-3xl w-full max-w-md shadow-2xl relative">
                        <button onClick={onClose} className="absolute -top-12 right-0 text-white flex items-center bg-navy px-4 py-2 rounded-full border border-white/20">
                            Đóng <Icon name="x" className="ml-2 w-4 h-4" />
                        </button>
                        <h3 className="text-center font-bold text-navy mb-4">Đưa camera vào mã vạch</h3>
                        <div id="reader" className="w-full"></div>
                    </div>
                </div>
            );
        };

        // --- COMPONENT: GAUGE CHART ---
        const GaugeChart = ({ value, max, label, subLabelLeft, subLabelRight, color }) => {
            const percentage = max > 0 ? Math.min(value / max, 1) : 0;
            const cx = 100; const cy = 90; const r = 75; const strokeWidth = 24;
            const circumference = Math.PI * r;
            const strokeDashoffset = circumference - (percentage * circumference);

            return (
                <div className="flex flex-col items-center p-6 bg-white rounded-3xl shadow-[0_8px_30px_rgb(16,63,103,0.05)] border border-navy/5">
                    <div className="w-full text-center mb-6">
                        <span className="text-slate font-medium text-sm block mb-1">{label}</span>
                        <span className="text-3xl font-extrabold text-navy">{max}</span>
                    </div>
                    <div className="relative w-56 h-32 overflow-hidden flex justify-center">
                        <svg className="w-full h-full drop-shadow-sm" viewBox="0 0 200 100">
                            <path d={`M ${cx - r} ${cy} A ${r} ${r} 0 0 1 ${cx + r} ${cy}`} fill="none" stroke="#D1D5DB" strokeWidth={strokeWidth} strokeLinecap="round" />
                            <path d={`M ${cx - r} ${cy} A ${r} ${r} 0 0 1 ${cx + r} ${cy}`} fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeDasharray={circumference} strokeDashoffset={strokeDashoffset} className="transition-all duration-1000 ease-out" />
                        </svg>
                        <div className="absolute bottom-1 flex flex-col items-center">
                            <span className="text-xl font-bold" style={{ color: color }}>{Math.round(percentage * 100)}%</span>
                        </div>
                    </div>
                    <div className="w-full mt-2 pt-4 border-t border-sand/50">
                        <p className="text-center text-sm font-semibold text-navy mb-2">Công suất xử lý</p>
                        <div className="flex justify-between text-xs font-medium text-slate">
                            <span>{subLabelLeft}</span>
                            <span>{subLabelRight}</span>
                        </div>
                    </div>
                </div>
            );
        };

        // --- VIEW 1: CẬN DATE ---
        const ViewCanDate = ({ addToSyncQueue }) => {
            const [barcode, setBarcode] = useState('');
            const [product, setProduct] = useState(null);
            const [qty, setQty] = useState('');
            const [expDate, setExpDate] = useState('');
            const [action, setAction] = useState('');
            const [npp, setNpp] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [isScanning, setIsScanning] = useState(false);
            const [msg, setMsg] = useState({ text: '', type: '' });

            const showMsg = (text, type = 'error') => {
                setMsg({ text, type });
                setTimeout(() => setMsg({ text: '', type: '' }), 3000);
            };

            const fetchProductData = async (codeToFetch) => {
                if(!codeToFetch) return showMsg("Vui lòng nhập Mã vạch!");
                setIsLoading(true);
                try {
                    const response = await fetch(`${API_URL}?action=scan&barcode=${codeToFetch}`);
                    const data = await response.json();
                    if(data.found) { setProduct(data); setNpp(data.npp); } 
                    else { showMsg("Không tìm thấy sản phẩm!"); setProduct(null); }
                } catch (error) {
                    showMsg("Lỗi kết nối máy chủ!");
                } finally { setIsLoading(false); }
            };

            const handleScanSuccess = (decodedText) => {
                setBarcode(decodedText);
                setIsScanning(false);
                fetchProductData(decodedText);
            };

            const handleSubmit = () => {
                if(!product || !qty || !expDate || !action) return showMsg("Vui lòng điền đủ thông tin!");
                if(action === 'doitra' && !npp) return showMsg("Vui lòng chọn NPP đổi trả!");
                
                const payload = {
                    action: "submitCanDate", barcode: barcode, name: product.name, qty: qty, 
                    expDate: expDate, handlingType: action === 'doitra' ? "Đổi Trả" : "Giảm Giá", npp: npp
                };

                addToSyncQueue(payload);
                showMsg("Đã lưu tạm! Đang đồng bộ...", "success");
                setBarcode(''); setProduct(null); setQty(''); setExpDate(''); setAction(''); setNpp('');
            };

            return (
                <div className="max-w-md mx-auto min-h-screen pt-6 pb-28 px-4">
                    {isScanning && <BarcodeScanner onScanSuccess={handleScanSuccess} onClose={() => setIsScanning(false)} />}
                    <Toast message={msg.text} type={msg.type} />
                    <div className="bg-white rounded-3xl shadow-sm p-6 relative z-10">
                        <h2 className="text-xl font-bold text-navy mb-6 flex items-center tracking-tight">
                            <span className="bg-gold/20 p-2 rounded-xl mr-3 text-gold"><Icon name="clock" /></span> Rà Soát Hạn Sử Dụng
                        </h2>
                        <div className="space-y-6">
                            <div className="space-y-2">
                                <label className="block text-sm font-semibold text-navy">Mã vạch sản phẩm</label>
                                <div className="flex gap-2">
                                    <input type="text" value={barcode} onChange={(e) => setBarcode(e.target.value)} onBlur={() => barcode && fetchProductData(barcode)} className="flex-1 bg-sand/20 border border-blue/30 rounded-2xl p-4 text-navy font-medium outline-none" placeholder="Nhập mã..." />
                                    <button onClick={() => setIsScanning(true)} className="bg-navy hover:bg-slate text-sand p-4 rounded-2xl flex items-center justify-center w-14 transition-colors">
                                        {isLoading ? "..." : <Icon name="scan-line" />}
                                    </button>
                                </div>
                            </div>
                            
                            {product && (
                                <div className="bg-navy/5 p-4 rounded-2xl border border-navy/10 flex items-center gap-4 animate-in fade-in">
                                    {product.imageUrl ? (
                                        <div className="w-12 h-12 bg-white rounded-xl border border-blue/30 flex items-center justify-center shrink-0 overflow-hidden shadow-sm">
                                            <img src={product.imageUrl} className="w-full h-full object-cover" />
                                        </div>
                                    ) : (
                                        <div className="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-gold shrink-0 shadow-sm">
                                            <Icon name="package-search" />
                                        </div>
                                    )}
                                    <div className="flex-1 min-w-0">
                                        <p className="text-[11px] font-semibold text-navy/50 uppercase">Sản phẩm</p>
                                        <p className="font-bold text-navy leading-tight truncate">{product.name}</p>
                                    </div>
                                </div>
                            )}

                            <div className="grid grid-cols-2 gap-3">
                                <div className="space-y-2 w-full overflow-hidden">
                                    <label className="block text-sm font-semibold text-navy">SL Tồn</label>
                                    <input type="number" value={qty} onChange={(e)=>setQty(e.target.value)} className="w-full bg-sand/20 border border-blue/30 rounded-2xl p-3 text-sm text-navy outline-none" placeholder="VD: 15" />
                                </div>
                                <div className="space-y-2 w-full overflow-hidden">
                                    <label className="block text-sm font-semibold text-navy whitespace-nowrap">Ngày Hết Hạn</label>
                                    <input type="date" value={expDate} onChange={(e)=>setExpDate(e.target.value)} className="w-full bg-sand/20 border border-blue/30 rounded-2xl p-3 text-sm text-navy outline-none" />
                                </div>
                            </div>

                            <div className="space-y-3 pt-2">
                                <label className="block text-sm font-semibold text-navy">Hướng xử lý <span className="text-red">*</span></label>
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => setAction('doitra')} className={`p-4 rounded-2xl border-2 font-semibold flex flex-col items-center gap-2 transition-all ${action === 'doitra' ? 'border-blue bg-blue/10 text-navy' : 'border-blue/20 text-slate'}`}>
                                        <Icon name="refresh-ccw" className={action === 'doitra' ? 'text-blue' : 'text-blue/40'} /> Đổi Trả NPP
                                    </button>
                                    <button onClick={() => setAction('giamgia')} className={`p-4 rounded-2xl border-2 font-semibold flex flex-col items-center gap-2 transition-all ${action === 'giamgia' ? 'border-gold bg-gold/10 text-navy' : 'border-blue/20 text-slate'}`}>
                                        <Icon name="alert-triangle" className={action === 'giamgia' ? 'text-gold' : 'text-blue/40'} /> Bán Giảm Giá
                                    </button>
                                </div>
                                {action === 'doitra' && (
                                    <div className="space-y-2 mt-4 p-4 bg-blue/5 border border-blue/20 rounded-2xl animate-in fade-in">
                                        <label className="block text-sm font-semibold text-navy">Chọn NPP Đổi Trả <span className="text-red">*</span></label>
                                        <div className="relative">
                                            <input list="npp-list" value={npp} onChange={(e)=>setNpp(e.target.value)} className="w-full bg-white border border-blue/50 rounded-xl p-3 pr-10 text-navy outline-none shadow-sm" placeholder="Tìm NPP..." />
                                            <datalist id="npp-list">{MOCK_NPP_LIST.map(n => <option key={n} value={n} />)}</datalist>
                                            <Icon name="search" className="absolute right-3 top-3.5 text-navy/40 w-5 h-5" />
                                        </div>
                                    </div>
                                )}
                            </div>

                            <button onClick={handleSubmit} className="w-full bg-navy hover:bg-slate text-sand font-bold py-4 rounded-2xl mt-8 transition-all flex items-center justify-center">
                                LƯU THÔNG TIN
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- VIEW 2: ĐẶT HÀNG ---
        const ViewDatHang = ({ locallyUploadedImages, setLocallyUploadedImages, addToSyncQueue }) => {
            const [barcode, setBarcode] = useState('');
            const [product, setProduct] = useState(null);
            const [qty, setQty] = useState('');
            const [npp, setNpp] = useState('');
            const [isNewModel, setIsNewModel] = useState(false);
            const [imgBase64, setImgBase64] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [isScanning, setIsScanning] = useState(false);
            const [msg, setMsg] = useState({ text: '', type: '' });

            const showMsg = (text, type = 'error') => {
                setMsg({ text, type });
                setTimeout(() => setMsg({ text: '', type: '' }), 3000);
            };

            const fetchProductData = async (codeToFetch) => {
                if(!codeToFetch) return showMsg("Vui lòng nhập Mã vạch!");
                setIsLoading(true);
                try {
                    const response = await fetch(`${API_URL}?action=scan&barcode=${codeToFetch}`);
                    const data = await response.json();
                    
                    if (locallyUploadedImages[codeToFetch]) data.hasImage = true;

                    if(data.found) { setProduct(data); setNpp(data.npp); } 
                    else { showMsg("Không tìm thấy sản phẩm!"); setProduct(null); }
                } catch (error) {
                    showMsg("Lỗi kết nối máy chủ!");
                } finally { setIsLoading(false); }
            };

            const handleScanSuccess = (decodedText) => {
                setBarcode(decodedText);
                setIsScanning(false);
                fetchProductData(decodedText);
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 600; 
                            let width = img.width;
                            let height = img.height;

                            if (width > MAX_WIDTH) {
                                height = Math.round((height * MAX_WIDTH) / width);
                                width = MAX_WIDTH;
                            }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);

                            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
                            setImgBase64(compressedBase64);
                        };
                    };
                }
            };

            const handleSubmit = () => {
                if(!product || !qty || !npp) return showMsg("Vui lòng điền đủ thông tin!");
                
                const payload = { 
                    action: "submitDatHang", barcode: barcode, name: product.name, qty: qty, npp: npp,
                    imageBase64: imgBase64, isNewModel: isNewModel
                };
                
                addToSyncQueue(payload);
                showMsg("Đã lưu tạm! Đang đồng bộ...", "success");
                
                if (imgBase64 || isNewModel) {
                    setLocallyUploadedImages(prev => ({ ...prev, [barcode]: true }));
                }

                setBarcode(''); setProduct(null); setQty(''); setNpp(''); setIsNewModel(false); setImgBase64('');
            };

            return (
                <div className="max-w-md mx-auto min-h-screen pt-6 pb-28 px-4">
                    {isScanning && <BarcodeScanner onScanSuccess={handleScanSuccess} onClose={() => setIsScanning(false)} />}
                    <Toast message={msg.text} type={msg.type} />
                    <div className="bg-white rounded-3xl shadow-sm p-6 relative z-10">
                        <h2 className="text-xl font-bold text-navy mb-6 flex items-center tracking-tight">
                            <span className="bg-blue/20 p-2 rounded-xl mr-3 text-blue"><Icon name="shopping-cart" /></span> Yêu Cầu Đặt Hàng
                        </h2>

                        <div className="space-y-6">
                            <div className="space-y-2">
                                <label className="block text-sm font-semibold text-navy">Mã Barcode</label>
                                <div className="flex gap-2">
                                    <input type="text" value={barcode} onChange={(e) => setBarcode(e.target.value)} onBlur={() => barcode && fetchProductData(barcode)} className="flex-1 bg-sand/20 border border-blue/30 rounded-2xl p-4 text-navy font-medium outline-none" placeholder="Nhập mã..." />
                                    <button onClick={() => setIsScanning(true)} className="bg-navy hover:bg-slate text-sand p-4 rounded-2xl flex items-center justify-center w-14">
                                        {isLoading ? "..." : <Icon name="scan-line" />}
                                    </button>
                                </div>
                            </div>

                            {product && (
                                <div className="bg-sand/30 p-4 rounded-2xl border border-sand flex gap-4 items-center animate-in fade-in">
                                    {imgBase64 ? (
                                        <div className="w-16 h-16 rounded-xl border border-green overflow-hidden shrink-0 flex items-center justify-center bg-white shadow-sm">
                                            <img src={`data:image/jpeg;base64,${imgBase64}`} className="w-full h-full object-cover" />
                                        </div>
                                    ) : product.imageUrl ? (
                                        <div className="w-16 h-16 bg-white rounded-xl border border-blue/30 flex items-center justify-center shrink-0 overflow-hidden shadow-sm">
                                            <img src={product.imageUrl} className="w-full h-full object-cover" />
                                        </div>
                                    ) : (
                                        <div className="w-16 h-16 bg-navy/5 rounded-xl border border-navy/10 flex flex-col items-center justify-center shrink-0 text-navy/50 shadow-sm">
                                            <Icon name="image" className="w-5 h-5" />
                                            <span className="text-[9px] font-bold mt-1 tracking-wider uppercase">Chưa Có</span>
                                        </div>
                                    )}
                                    <div className="flex-1 min-w-0">
                                        <p className="font-bold text-navy leading-tight truncate">{product.name}</p>
                                        <p className="text-xs text-slate mt-1 flex items-center gap-1 truncate"><Icon name="map-pin" className="w-3 h-3 flex-shrink-0" /> {product.npp}</p>
                                        {imgBase64 && (
                                            <span className="inline-block mt-1 text-[10px] font-bold text-green bg-green/10 px-2 py-0.5 rounded-full">
                                                Đã đính kèm ảnh mới
                                            </span>
                                        )}
                                    </div>
                                </div>
                            )}

                            <div className="space-y-2">
                                <label className="block text-sm font-semibold text-navy">Số lượng dự kiến <span className="text-red">*</span></label>
                                <input type="number" value={qty} onChange={(e)=>setQty(e.target.value)} className="w-full bg-sand/20 border border-blue/30 rounded-2xl p-4 text-navy outline-none" placeholder="Nhập số lượng..." />
                            </div>

                            <div className="space-y-2">
                                <label className="block text-sm font-semibold text-navy">Nhà Phân Phối <span className="text-red">*</span></label>
                                <div className="relative">
                                    <input list="npp-list-order" value={npp} onChange={(e)=>setNpp(e.target.value)} className="w-full bg-sand/20 border border-blue/30 rounded-2xl p-4 pr-12 text-navy outline-none" placeholder="Tìm NPP..." />
                                    <datalist id="npp-list-order">{MOCK_NPP_LIST.map(n => <option key={n} value={n} />)}</datalist>
                                    <Icon name="search" className="absolute right-4 top-4 text-navy/40 w-5 h-5" />
                                </div>
                            </div>

                            {product && (
                                <div className={`p-5 rounded-2xl border ${product.hasImage === false ? 'border-red/30 bg-red/5' : 'border-blue/20 bg-sand/10'}`}>
                                    <div className="mb-4">
                                        <p className="text-sm font-bold text-navy">Hình ảnh sản phẩm</p>
                                        <p className="text-xs text-slate mt-1">Tùy chọn tải ảnh mới để cập nhật bao bì cho hệ thống.</p>
                                    </div>
                                    
                                    <label className="flex items-center gap-3 mb-4 cursor-pointer">
                                        <input type="checkbox" checked={isNewModel} onChange={(e)=>setIsNewModel(e.target.checked)} className="w-5 h-5 rounded border-blue/50" />
                                        <span className="text-sm text-navy font-semibold">Tải lên / Cập nhật ảnh</span>
                                    </label>

                                    {(product.hasImage === false || isNewModel) && (
                                        <label className="border-2 border-dashed border-blue/50 rounded-2xl p-6 flex flex-col items-center justify-center bg-white cursor-pointer hover:border-navy hover:bg-navy/5 transition-all relative overflow-hidden">
                                            <input type="file" accept="image/*" className="hidden" onChange={handleImageUpload} />
                                            {imgBase64 ? (
                                                <div className="flex flex-col items-center text-green relative z-10">
                                                    <Icon name="check-circle-2" className="w-10 h-10 mb-2" />
                                                    <span className="text-sm font-bold text-center">Đã đính kèm ảnh!<br/>Sẵn sàng để gửi</span>
                                                </div>
                                            ) : (
                                                <div className="flex flex-col items-center relative z-10">
                                                    <div className="w-12 h-12 bg-sand/50 rounded-full flex items-center justify-center mb-3 text-navy"><Icon name="upload-cloud" /></div>
                                                    <span className="text-sm text-navy font-semibold text-center">Bấm để chụp ảnh<br/>hoặc chọn từ Thư viện</span>
                                                </div>
                                            )}
                                        </label>
                                    )}
                                </div>
                            )}

                            <button onClick={handleSubmit} className="w-full bg-navy hover:bg-slate text-sand font-bold py-4 rounded-2xl mt-8 transition-all flex items-center justify-center">
                                GỬI YÊU CẦU
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MỚI: HÀM TÍNH TOÁN BUCKET THỜI GIAN ĐỔI TRẢ ---
        const TIME_BUCKETS = ['60 ngày', '30 ngày', '15 ngày', '07 ngày', '0 ngày'];
        const getExpBucket = (days) => {
            if (days <= 0) return '0 ngày';
            if (days <= 7) return '07 ngày';
            if (days <= 15) return '15 ngày';
            if (days <= 30) return '30 ngày';
            return '60 ngày';
        };

        // --- VIEW 3: DASHBOARD ---
        const ViewDashboard = ({ addToSyncQueue }) => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [password, setPassword] = useState('');
            const [loginError, setLoginError] = useState('');

            const [returns, setReturns] = useState([]);
            const [discounts, setDiscounts] = useState([]);
            const [orders, setOrders] = useState([]);
            const [completedOrdersCount, setCompletedOrdersCount] = useState(0);
            const [isLoading, setIsLoading] = useState(false);
            const [apiError, setApiError] = useState('');
            const [msg, setMsg] = useState({ text: '', type: '' });

            const showMsg = (text, type = 'error') => {
                setMsg({ text, type });
                setTimeout(() => setMsg({ text: '', type: '' }), 3000);
            };

            const [activeOrderNppTab, setActiveOrderNppTab] = useState('');
            
            // State Đổi trả 2 cấp
            const [activeReturnTimeTab, setActiveReturnTimeTab] = useState('0 ngày');
            const [activeReturnNppTab, setActiveReturnNppTab] = useState('');

            const fetchDashboardData = async () => {
                setIsLoading(true);
                try {
                    const response = await fetch(`${API_URL}?action=getDashboard`);
                    const result = await response.json();
                    
                    if (result.error) {
                        setApiError(`Lỗi từ Google Sheets: ${result.error}`);
                    } else if (result.returns) {
                        setReturns(result.returns);
                        setDiscounts(result.discounts);
                        setOrders(result.orders);
                    }
                } catch (error) {
                    setApiError("Không thể kết nối đến máy chủ. Vui lòng kiểm tra lại link API.");
                    // Fallback Offline/Test Data
                    setReturns([
                        { id: 2, barcode: '8935001282655', name: 'BÍ ĐAO | WINTER MELON TEA WDF 440ML', qty: 6, npp: 'NPP THIÊN THÀNH - ICE+ LATTE (MINH ANH DN)', status: 'Chờ xử lý', note: '', daysLeft: 5 },
                        { id: 3, barcode: '8931122334455', name: 'Bánh Kinh Đô', qty: 5, npp: 'NPP VŨ MINH HƯNG - KINH ĐÔ', status: 'Đã báo NPP', note: '', daysLeft: -2 }
                    ]);
                    setDiscounts([
                        { id: 3, barcode: '8934567890123', name: 'Bánh Sandwitch', daysLeft: 7, qtyOriginal: 20, qtyActual: '', suggestPct: 40, actualPct: 40 }
                    ]);
                    setOrders([
                        { id: 2, barcode: '8935001282655', name: 'BÍ ĐAO | WINTER MELON TEA WDF 440ML', qty: 24, npp: 'NPP THIÊN THÀNH - ICE+ LATTE (MINH ANH DN)', hoursWait: 1 }
                    ]);
                } finally {
                    setIsLoading(false);
                }
            };

            const handleRefresh = () => {
                fetchDashboardData();
                showMsg("Đã làm mới dữ liệu!", "success");
            }

            useEffect(() => {
                if (!isAuthenticated) return;
                fetchDashboardData();
                const interval = setInterval(() => {
                    fetchDashboardData();
                }, 180000); 
                return () => clearInterval(interval);
            }, [isAuthenticated]);

            // --- LỌC ĐƠN HÀNG ---
            const groupedOrders = orders.reduce((acc, order) => {
                if (!acc[order.npp]) acc[order.npp] = [];
                acc[order.npp].push(order);
                return acc;
            }, {});

            useEffect(() => {
                const activeOrderNpps = Object.keys(groupedOrders);
                if (activeOrderNpps.length > 0 && !activeOrderNpps.includes(activeOrderNppTab)) {
                    setActiveOrderNppTab(activeOrderNpps[0]);
                }
            }, [orders]);

            // --- LỌC ĐỔI TRẢ 2 CẤP ---
            // Tự động chọn Tab thời gian đầu tiên có dữ liệu khi load xong
            useEffect(() => {
                if (returns.length > 0) {
                   const availableBuckets = returns.map(r => getExpBucket(r.daysLeft));
                   if (!availableBuckets.includes(activeReturnTimeTab)) {
                       for (let i = TIME_BUCKETS.length - 1; i >= 0; i--) {
                           if (availableBuckets.includes(TIME_BUCKETS[i])) {
                               setActiveReturnTimeTab(TIME_BUCKETS[i]);
                               break;
                           }
                       }
                   }
                }
            }, [returns]);

            // Lọc ra các return thuộc Tab Thời Gian hiện tại
            const filteredReturns = returns.filter(r => getExpBucket(r.daysLeft) === activeReturnTimeTab);
            
            // Gom nhóm tiếp theo NPP
            const groupedReturns = filteredReturns.reduce((acc, ret) => {
                if (!acc[ret.npp]) acc[ret.npp] = [];
                acc[ret.npp].push(ret);
                return acc;
            }, {});

            // Tự động chọn NPP đầu tiên của Tab Thời gian đó
            useEffect(() => {
                const activeReturnNpps = Object.keys(groupedReturns);
                if (activeReturnNpps.length > 0 && !activeReturnNpps.includes(activeReturnNppTab)) {
                    setActiveReturnNppTab(activeReturnNpps[0]);
                } else if (activeReturnNpps.length === 0) {
                    setActiveReturnNppTab('');
                }
            }, [filteredReturns]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (password === '56789') {
                    setIsAuthenticated(true);
                    setLoginError('');
                } else {
                    setLoginError('Mã PIN không chính xác!');
                }
            };

            const getWaitAlert = (hours) => {
                if (hours < 12) return { bg: 'bg-green/10', text: 'text-green', border: 'border-green/20', icon: '🟢 An toàn' };
                if (hours < 24) return { bg: 'bg-gold/15', text: 'text-darkred', border: 'border-gold/30', icon: '⏱️ Chú ý' };
                if (hours < 36) return { bg: 'bg-red/15', text: 'text-darkred', border: 'border-red/30', icon: '⚠️ Trễ' };
                return { bg: 'bg-darkred/10', text: 'text-darkred', border: 'border-darkred/30 animate-pulse', icon: '🚨 Khẩn' };
            };

            const handleReturnStatus = (id, newStatus) => {
                setReturns(returns.map(r => r.id === id ? { ...r, status: newStatus } : r));
                addToSyncQueue({ action: "updateReturnStatus", id: id, status: newStatus });
                showMsg("Đã lưu tạm! Đang đồng bộ trạng thái...", "success");
            };
            
            const handleCloseOrders = (nppName) => {
                setOrders(orders.filter(o => o.npp !== nppName));
                setCompletedOrdersCount(prev => prev + 1);
                addToSyncQueue({ action: "completeOrderNpp", npp: nppName });
                showMsg(`Đã lưu chốt đơn ${nppName}! Đang đồng bộ...`, "success");
            };

            const handleUpdateDiscount = (id, field, value) => {
                 setDiscounts(prev => prev.map(d => d.id === id ? { ...d, [field]: value, needsDailyUpdate: false } : d));

                 const currentItem = discounts.find(d => d.id === id);
                 const payloadToSync = { ...currentItem, [field]: value };

                 addToSyncQueue({
                     action: "updateDiscountRecord",
                     id: id,
                     qtyActual: payloadToSync.qtyActual,
                     actualPct: payloadToSync.actualPct,
                     isPromoApplied: payloadToSync.isPromoApplied
                 });
            };

            const totalReturns = returns.length;
            const pendingReturns = returns.filter(r => r.status === 'Chờ xử lý').length;
            const processedReturns = totalReturns - pendingReturns;

            const totalDiscounts = discounts.length;
            const pendingDiscounts = discounts.filter(d => d.qtyActual === '' || d.needsDailyUpdate).length;
            const processedDiscounts = totalDiscounts - pendingDiscounts;

            const pendingOrders = Object.keys(groupedOrders).length;
            const totalOrders = pendingOrders + completedOrdersCount;

            const isDiscountPending = discounts.some(d => d.qtyActual === '' || d.needsDailyUpdate);

            if (!isAuthenticated) {
                return (
                    <div className="max-w-md mx-auto pt-32 px-4 min-h-screen flex flex-col items-center">
                        <div className="bg-white p-8 rounded-3xl shadow-sm border border-navy/5 w-full text-center relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-1 bg-gold"></div>
                            <div className="w-16 h-16 bg-navy/5 text-navy rounded-full flex items-center justify-center mx-auto mb-4">
                                <Icon name="lock" className="w-8 h-8" />
                            </div>
                            <h2 className="text-2xl font-bold text-navy mb-2">Khu Vực Quản Lý</h2>
                            <p className="text-slate text-sm mb-6">Vui lòng nhập mã PIN để truy cập Dashboard</p>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="• • • • •" className="w-full bg-sand/20 border border-blue/30 rounded-2xl p-4 text-center text-navy font-bold tracking-[0.5em] text-xl outline-none focus:ring-2 focus:ring-blue transition-all" />
                                </div>
                                {loginError && <p className="text-red text-sm font-semibold">{loginError}</p>}
                                <button type="submit" className="w-full bg-navy hover:bg-slate text-sand font-bold py-4 rounded-2xl transition-all shadow-md">XÁC NHẬN</button>
                            </form>
                        </div>
                    </div>
                );
            }

            if(isLoading && discounts.length === 0) return <div className="h-screen flex flex-col items-center justify-center text-navy font-bold text-lg"><Icon name="loader-2" className="animate-spin w-10 h-10 mb-4 text-gold" />Đang tải dữ liệu...</div>;

            const lockClass = isDiscountPending ? "opacity-30 pointer-events-none grayscale blur-[1px] transition-all duration-500" : "transition-all duration-500";

            return (
                <div className="max-w-5xl mx-auto pt-6 px-4 md:px-6 pb-28 animate-in fade-in relative">
                    <Toast message={msg.text} type={msg.type} />
                    <div className="flex justify-between items-center mb-8">
                        <div>
                            <h1 className="text-3xl font-bold text-navy tracking-tight">ONE STOP <span className="font-light">| Operations</span></h1>
                            <p className="text-slate mt-1 font-medium">Trung tâm điều hành cửa hàng</p>
                        </div>
                        <button onClick={handleRefresh} className="bg-white p-3 rounded-full shadow-sm text-navy hover:bg-sand/50 transition-all flex items-center gap-2">
                            <Icon name="refresh-cw" className={`w-5 h-5 ${isLoading ? 'animate-spin text-gold' : ''}`} />
                            <span className="text-sm font-bold hidden md:inline">Làm mới</span>
                        </button>
                    </div>

                    {apiError && (
                        <div className="mb-6 p-4 bg-red/10 border border-red/30 rounded-2xl text-darkred font-medium flex items-center">
                            <Icon name="alert-triangle" className="mr-3" />
                            {apiError}
                        </div>
                    )}

                    {isDiscountPending && (
                        <div className="mb-6 p-4 bg-gold/20 border border-gold/50 rounded-2xl text-navy font-bold flex items-start shadow-md animate-pulse">
                            <Icon name="shield-alert" className="mr-3 w-6 h-6 flex-shrink-0 text-gold" />
                            <div>
                                <p className="text-lg">KHÓA HỆ THỐNG ĐẦU NGÀY</p>
                                <p className="text-sm font-medium mt-1">Yêu cầu Quản lý điền đủ thông số "Tồn quầy hiện tại" ở bảng Hàng Cận Date bên dưới để mở khóa toàn bộ Dashboard.</p>
                            </div>
                        </div>
                    )}

                    <div className={`grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 ${lockClass}`}>
                        <GaugeChart value={processedDiscounts} max={totalDiscounts} label="Xử lý cận Date & Giảm giá" subLabelLeft={`Đã KT: ${processedDiscounts}`} subLabelRight={`Chưa KT: ${pendingDiscounts}`} color={processedDiscounts === totalDiscounts && totalDiscounts > 0 ? "#0AA878" : "#F0573A"} />
                        <GaugeChart value={processedReturns} max={totalReturns} label="Yêu cầu Đổi trả" subLabelLeft={`Đã xử lý: ${processedReturns}`} subLabelRight={`Chờ: ${pendingReturns}`} color="#103F67" />
                        <GaugeChart value={completedOrdersCount} max={totalOrders} label="Xử lý Đặt hàng" subLabelLeft={`Đã chốt: ${completedOrdersCount}`} subLabelRight={`Đang chờ: ${pendingOrders}`} color="#DAAF4F" />
                    </div>

                    <div className="space-y-10">
                        {/* KHU 1: GIẢM GIÁ */}
                        <div className={`bg-white rounded-3xl shadow-md border-2 overflow-hidden relative transition-all ${isDiscountPending ? 'border-red ring-4 ring-red/20' : 'border-sand'}`}>
                            <div className="bg-[#F0573A] p-5 border-b flex justify-between items-center text-white">
                                <h2 className="font-bold flex items-center text-lg"><Icon name="alert-triangle" className="mr-3" /> THEO DÕI HÀNG CẬN DATE & ÁP DỤNG CHÍNH SÁCH GIẢM GIÁ</h2>
                                {isDiscountPending && <span className="text-xs font-bold text-red bg-white px-3 py-1.5 rounded-full uppercase shadow-sm">Bắt buộc cập nhật</span>}
                            </div>
                            <div className="p-0 overflow-x-auto">
                                <table className="w-full text-sm text-left border-collapse min-w-[800px]">
                                    <thead className="bg-sand/30 text-slate">
                                        <tr>
                                            <th className="p-4 font-semibold uppercase text-[11px]">Sản phẩm & Date</th>
                                            <th className="p-4 font-semibold uppercase text-[11px] text-center w-28">Gợi ý % Giảm giá</th>
                                            <th className="p-4 font-semibold uppercase text-[11px] text-center w-36">% Giảm Giá Chính Sách</th>
                                            <th className="p-4 font-semibold uppercase text-[11px] text-center w-36">Tồn quầy hiện tại</th>
                                            <th className="p-4 font-semibold uppercase text-[11px] text-center w-32">Khuyến mãi</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-sand/50">
                                        {discounts.length === 0 && (
                                            <tr><td colSpan="5" className="p-8 text-center text-slate/50 font-medium">Chưa có dữ liệu Cận Date & Giảm Giá (Từ 35 ngày trở xuống)</td></tr>
                                        )}
                                        {discounts.map(d => (
                                            <tr key={d.id} className={`hover:bg-sand/10 transition-colors ${(d.qtyActual === '' || d.needsDailyUpdate) ? 'bg-red/5' : ''}`}>
                                                <td className="p-4">
                                                    <p className="font-bold text-navy text-base">{d.name}</p>
                                                    <p className="text-xs font-mono text-slate/70 mt-1">SKU: {d.barcode || 'N/A'}</p>
                                                    <p className="text-sm font-medium text-red mt-1">Còn {d.daysLeft} ngày <span className="text-blue mx-2">|</span> Số lượng tồn: {d.qtyOriginal}</p>
                                                </td>
                                                <td className="p-4 text-center font-bold text-slate/40 text-lg">{d.suggestPct}%</td>
                                                <td className="p-4 text-center">
                                                    <input 
                                                        type="number" 
                                                        value={d.actualPct} 
                                                        onChange={(e) => setDiscounts(prev => prev.map(item => item.id === d.id ? {...item, actualPct: e.target.value} : item))}
                                                        onBlur={(e) => handleUpdateDiscount(d.id, 'actualPct', e.target.value)}
                                                        className="w-20 text-center border border-blue/30 rounded-xl p-3 font-bold text-navy bg-sand/20 outline-none focus:ring-2 focus:ring-gold" 
                                                    />
                                                </td>
                                                <td className="p-4 text-center relative">
                                                    <input 
                                                        type="number" 
                                                        value={d.qtyActual} 
                                                        onChange={(e) => setDiscounts(prev => prev.map(item => item.id === d.id ? {...item, qtyActual: e.target.value} : item))}
                                                        onBlur={(e) => handleUpdateDiscount(d.id, 'qtyActual', e.target.value)}
                                                        className={`w-full text-center border-2 rounded-xl p-3 font-bold text-lg outline-none focus:ring-2
                                                            ${(d.qtyActual === '' || d.needsDailyUpdate) ? 'border-red/50 bg-red/10 text-darkred focus:ring-red' : 
                                                              d.qtyActual == 0 ? 'border-sand bg-sand/50 text-navy/30' : 'border-green/50 bg-green/10 text-green focus:ring-green'}`} 
                                                        placeholder="Nhập..." 
                                                    />
                                                    {d.needsDailyUpdate && d.qtyActual !== '' && <p className="absolute left-0 w-full text-[10px] text-red mt-1 font-bold text-center">Xác nhận lại hôm nay</p>}
                                                    {d.qtyActual == 0 && d.qtyActual !== '' && !d.needsDailyUpdate && <p className="absolute left-0 w-full text-[10px] text-darkred mt-1 font-bold text-center">ĐÃ HẾT! TẮT POS</p>}
                                                </td>
                                                <td className="p-4 text-center">
                                                    <button 
                                                        onClick={() => handleUpdateDiscount(d.id, 'isPromoApplied', !d.isPromoApplied)}
                                                        className={`w-12 h-6 rounded-full relative transition-colors duration-300 mx-auto block ${d.isPromoApplied ? 'bg-green' : 'bg-slate/30'}`}
                                                    >
                                                        <div className={`w-5 h-5 bg-white rounded-full absolute top-0.5 transition-transform duration-300 shadow-sm ${d.isPromoApplied ? 'translate-x-6' : 'translate-x-1'}`}></div>
                                                    </button>
                                                    <span className={`text-[10px] font-bold mt-2 block ${d.isPromoApplied ? 'text-green' : 'text-slate/50'}`}>
                                                        {d.isPromoApplied ? 'Đã chạy' : 'Chưa chạy'}
                                                    </span>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* KHU 2: ĐỔI TRẢ (PHÂN LỚP 2 TẦNG: THỜI GIAN -> NPP) */}
                        <div className={`bg-white rounded-3xl shadow-sm border border-navy/5 overflow-hidden ${lockClass}`}>
                            <div className="bg-navy p-5 text-sand flex justify-between items-center">
                                <h2 className="font-semibold flex items-center"><Icon name="refresh-ccw" className="mr-3 text-gold" /> QUẢN LÝ ĐỔI TRẢ</h2>
                                <span className="bg-gold text-navy font-bold text-xs px-3 py-1.5 rounded-full">{totalReturns} Yêu cầu</span>
                            </div>
                            
                            {totalReturns === 0 ? (
                                <div className="p-8 text-center text-slate/50 font-medium">Chưa có dữ liệu Đổi Trả NPP</div>
                            ) : (
                                <div className="p-5 space-y-4">
                                    {/* TAB THỜI GIAN (LEVEL 1) */}
                                    <div className="flex gap-2 overflow-x-auto pb-4 mb-2 hide-scrollbar border-b border-sand/50">
                                        {TIME_BUCKETS.map(bucket => {
                                            const count = returns.filter(r => getExpBucket(r.daysLeft) === bucket).length;
                                            return (
                                                <button
                                                    key={bucket}
                                                    onClick={() => setActiveReturnTimeTab(bucket)}
                                                    className={`px-4 py-2 text-sm font-bold rounded-xl transition-all whitespace-nowrap flex items-center gap-2 border-2
                                                        ${activeReturnTimeTab === bucket 
                                                            ? 'border-navy bg-navy text-sand shadow-md' 
                                                            : 'border-sand/50 bg-white text-slate hover:border-navy/30'}`}
                                                >
                                                    {bucket}
                                                    <span className={`px-2 py-0.5 rounded-lg text-xs ${activeReturnTimeTab === bucket ? 'bg-gold text-navy' : 'bg-sand text-navy'}`}>
                                                        {count}
                                                    </span>
                                                </button>
                                            );
                                        })}
                                    </div>

                                    {/* TAB NPP (LEVEL 2) */}
                                    {Object.keys(groupedReturns).length > 0 ? (
                                        <div className="flex gap-2 overflow-x-auto pb-2 hide-scrollbar">
                                            {Object.keys(groupedReturns).map(nppName => (
                                                <button
                                                    key={nppName}
                                                    onClick={() => setActiveReturnNppTab(nppName)}
                                                    className={`px-4 py-2 text-xs font-bold rounded-full transition-all whitespace-nowrap flex items-center gap-2
                                                        ${activeReturnNppTab === nppName ? 'bg-navy text-sand shadow-sm' : 'bg-sand/30 hover:bg-sand/50 text-navy'}`}
                                                >
                                                    {nppName}
                                                    <span className={`px-2 py-0.5 rounded-full text-[10px] ${activeReturnNppTab === nppName ? 'bg-gold text-navy' : 'bg-navy/10 text-navy'}`}>
                                                        {groupedReturns[nppName].length}
                                                    </span>
                                                </button>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="text-center text-slate/50 text-sm py-4">Không có sản phẩm nào thuộc nhóm thời gian này.</div>
                                    )}

                                    {/* TABLE CHI TIẾT SẢN PHẨM */}
                                    {activeReturnNppTab && groupedReturns[activeReturnNppTab] && (
                                        <div className="overflow-x-auto border border-sand rounded-2xl animate-in fade-in">
                                            <table className="w-full text-sm text-left border-collapse">
                                                <thead className="bg-sand/30 text-slate">
                                                    <tr>
                                                        <th className="p-4 font-semibold uppercase text-[11px]">Tên sản phẩm</th>
                                                        <th className="p-4 font-semibold uppercase text-[11px] text-center">Mã SKU</th>
                                                        <th className="p-4 font-semibold uppercase text-[11px] text-center w-24">Số lượng</th>
                                                        <th className="p-4 font-semibold uppercase text-[11px] text-center w-36">Trạng thái</th>
                                                        <th className="p-4 font-semibold uppercase text-[11px] w-48">Ghi chú</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-sand/50">
                                                    {groupedReturns[activeReturnNppTab].map(r => (
                                                        <tr key={r.id} className="hover:bg-sand/10">
                                                            <td className="p-4 font-bold text-navy">{r.name}</td>
                                                            <td className="p-4 text-center font-mono text-slate text-xs">{r.barcode || "N/A"}</td>
                                                            <td className="p-4 text-center font-bold text-navy">{r.qty}</td>
                                                            <td className="p-4 text-center">
                                                                <select 
                                                                    value={r.status} 
                                                                    onChange={(e) => handleReturnStatus(r.id, e.target.value)} 
                                                                    className={`text-xs font-bold rounded-xl px-3 py-1.5 outline-none border w-full text-center appearance-none cursor-pointer
                                                                        ${r.status === 'Chờ xử lý' ? 'bg-white border-blue text-slate' : 
                                                                          r.status === 'Đã báo NPP' ? 'bg-blue/10 border-blue/30 text-navy' : 'bg-green/10 border-green/30 text-green'}`}
                                                                >
                                                                    <option value="Chờ xử lý">Chờ xử lý</option>
                                                                    <option value="Đã báo NPP">Đã báo NPP</option>
                                                                    <option value="Đã nhận đổi trả">Đã nhận đổi trả</option>
                                                                </select>
                                                            </td>
                                                            <td className="p-4">
                                                                {r.status === 'Đã nhận đổi trả' ? (
                                                                    <input type="text" placeholder="Ghi chú cấn trừ..." className="border border-blue/50 rounded-lg px-3 py-1.5 text-xs w-full outline-none" />
                                                                ) : (
                                                                    <span className="text-blue text-xs italic">Đang chờ xử lý</span>
                                                                )}
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        {/* KHU 3: XỬ LÝ ĐẶT HÀNG */}
                        <div className={`bg-white rounded-3xl shadow-sm border border-navy/5 overflow-hidden ${lockClass}`}>
                            <div className="bg-navy p-5 text-sand flex justify-between items-center">
                                <h2 className="font-semibold flex items-center"><Icon name="shopping-cart" className="mr-3 text-gold" /> XỬ LÝ ĐẶT HÀNG</h2>
                                <span className="bg-gold text-navy font-bold text-xs px-3 py-1.5 rounded-full">{orders.length} Sản phẩm cần đặt</span>
                            </div>

                            {orders.length === 0 ? (
                                <div className="p-8 text-center text-blue py-8 font-medium">Không có đơn hàng nào chờ xử lý.</div>
                            ) : (
                                <div className="p-5 space-y-4">
                                    <div className="flex gap-2 overflow-x-auto pb-2 hide-scrollbar border-b border-sand/50">
                                        {Object.keys(groupedOrders).map(nppName => {
                                            const maxWait = Math.max(...groupedOrders[nppName].map(o => o.hoursWait));
                                            const alertStyle = getWaitAlert(maxWait);
                                            return (
                                                <button
                                                    key={nppName}
                                                    onClick={() => setActiveOrderNppTab(nppName)}
                                                    className={`px-4 py-2 text-xs font-bold rounded-full transition-all whitespace-nowrap flex items-center gap-2
                                                        ${activeOrderNppTab === nppName ? 'bg-navy text-sand shadow-sm' : 'bg-sand/30 hover:bg-sand/50 text-navy'}`}
                                                >
                                                    <span className="text-[10px]">{alertStyle.icon.split(' ')[0]}</span>
                                                    {nppName}
                                                    <span className={`px-2 py-0.5 rounded-full text-[10px] ${activeOrderNppTab === nppName ? 'bg-gold text-navy' : 'bg-navy/10 text-navy'}`}>
                                                        {groupedOrders[nppName].length}
                                                    </span>
                                                </button>
                                            );
                                        })}
                                    </div>

                                    {activeOrderNppTab && groupedOrders[activeOrderNppTab] && (
                                        <div className="space-y-4 animate-in fade-in">
                                            <div className="flex justify-between items-center bg-sand/10 p-3 rounded-2xl border border-sand">
                                                <div>
                                                    <p className="text-xs text-slate font-medium">Nhà phân phối đang xem:</p>
                                                    <h3 className="font-bold text-navy text-sm">{activeOrderNppTab}</h3>
                                                </div>
                                                <button 
                                                    onClick={() => handleCloseOrders(activeOrderNppTab)} 
                                                    className="bg-navy hover:bg-slate text-sand text-xs font-bold px-4 py-2.5 rounded-xl shadow-sm flex items-center gap-2 transition-colors"
                                                >
                                                    <Icon name="check-circle-2" className="text-gold" /> Xác nhận đã chốt đơn
                                                </button>
                                            </div>

                                            <div className="overflow-x-auto border border-sand rounded-2xl">
                                                <table className="w-full text-sm text-left border-collapse">
                                                    <thead className="bg-sand/30 text-slate">
                                                        <tr>
                                                            <th className="p-4 font-semibold uppercase text-[11px]">Tên sản phẩm</th>
                                                            <th className="p-4 font-semibold uppercase text-[11px] text-center">Mã SKU</th>
                                                            <th className="p-4 font-semibold uppercase text-[11px] text-center w-24">Số lượng</th>
                                                            <th className="p-4 font-semibold uppercase text-[11px] text-center w-32">Chờ xử lý</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-sand/50">
                                                        {groupedOrders[activeOrderNppTab].map(item => {
                                                            const alertStyle = getWaitAlert(item.hoursWait);
                                                            return (
                                                                <tr key={item.id} className="hover:bg-sand/10">
                                                                    <td className="p-4 font-bold text-navy">{item.name}</td>
                                                                    <td className="p-4 text-center font-mono text-slate text-xs">{item.barcode || "N/A"}</td>
                                                                    <td className="p-4 text-center font-bold text-navy">{item.qty}</td>
                                                                    <td className="p-4 text-center">
                                                                        <span className={`inline-block text-xs font-bold px-3 py-1 rounded-full ${alertStyle.bg} ${alertStyle.text}`}>
                                                                            {item.hoursWait} giờ ({alertStyle.icon.split(' ')[1]})
                                                                        </span>
                                                                    </td>
                                                                </tr>
                                                            );
                                                        })}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- COMPONENT: HIỂN THỊ TRẠNG THÁI ĐỒNG BỘ NGẦM ---
        const SyncIndicator = ({ current, total }) => {
            if (total === 0) return null;
            return (
                <div className="fixed top-4 right-4 z-[150] bg-navy/90 backdrop-blur text-gold px-4 py-2 rounded-full shadow-lg flex items-center gap-2 text-xs font-bold animate-in fade-in">
                    <Icon name="cloud-upload" className="w-4 h-4 animate-bounce" />
                    Đang đồng bộ: {Math.min(current + 1, total)}/{total}
                </div>
            );
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('candate');
            const [locallyUploadedImages, setLocallyUploadedImages] = useState({});
            
            const [syncQueue, setSyncQueue] = useState(() => {
                const saved = localStorage.getItem('oneStopSyncQueue');
                return saved ? JSON.parse(saved) : [];
            });
            const [syncTotal, setSyncTotal] = useState(syncQueue.length);
            const [syncProcessed, setSyncProcessed] = useState(0);
            const isSyncingRef = useRef(false);

            useEffect(() => {
                localStorage.setItem('oneStopSyncQueue', JSON.stringify(syncQueue));
                if (syncQueue.length === 0) {
                    setSyncTotal(0);
                    setSyncProcessed(0);
                }
            }, [syncQueue]);

            useEffect(() => {
                const handleBeforeUnload = (e) => {
                    if (syncQueue.length > 0) {
                        const message = 'Hệ thống đang được đồng bộ, đề nghị bạn không tắt đi.';
                        e.preventDefault();
                        e.returnValue = message;
                        return message;
                    }
                };
                window.addEventListener('beforeunload', handleBeforeUnload);
                return () => window.removeEventListener('beforeunload', handleBeforeUnload);
            }, [syncQueue]);

            useEffect(() => {
                if (syncQueue.length === 0 || isSyncingRef.current) return;

                const processNext = async () => {
                    isSyncingRef.current = true;
                    const currentItem = syncQueue[0];

                    try {
                        await fetch(API_URL, {
                            method: 'POST',
                            mode: 'no-cors', 
                            headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify(currentItem.payload)
                        });

                        setSyncProcessed(prev => prev + 1);
                        setSyncQueue(prev => prev.filter(item => item.id !== currentItem.id));
                    } catch (error) {
                        console.error("Lỗi đồng bộ ngầm:", error);
                        await new Promise(res => setTimeout(res, 3000));
                        setSyncQueue(prev => {
                            const newQ = [...prev.filter(item => item.id !== currentItem.id), currentItem];
                            return newQ;
                        });
                    } finally {
                        isSyncingRef.current = false;
                    }
                };

                processNext();
            }, [syncQueue]);

            const addToSyncQueue = (payload) => {
                const newItem = { id: Date.now() + Math.random().toString(), payload };
                setSyncQueue(prev => {
                    if (prev.length === 0) {
                        setSyncTotal(1);
                        setSyncProcessed(0);
                    } else {
                        setSyncTotal(t => t + 1);
                    }
                    return [...prev, newItem];
                });
            };

            return (
                <div className="bg-sand min-h-screen font-sans pb-20">
                    <SyncIndicator current={syncProcessed} total={syncTotal} />
                    
                    <div className="w-full">
                        {activeTab === 'candate' && <ViewCanDate addToSyncQueue={addToSyncQueue} />}
                        {activeTab === 'dathang' && (
                            <ViewDatHang 
                                locallyUploadedImages={locallyUploadedImages} 
                                setLocallyUploadedImages={setLocallyUploadedImages} 
                                addToSyncQueue={addToSyncQueue}
                            />
                        )}
                        {activeTab === 'dashboard' && <ViewDashboard addToSyncQueue={addToSyncQueue} />}
                    </div>

                    <div className="fixed bottom-6 w-full flex justify-center z-50 px-4 pointer-events-none">
                        <div className="bg-white/90 backdrop-blur-md shadow-[0_20px_40px_rgb(16,63,103,0.12)] rounded-3xl flex justify-around p-2 w-full max-w-md pointer-events-auto">
                            <button onClick={() => setActiveTab('candate')} className={`flex flex-col items-center justify-center w-full py-3 rounded-2xl transition-all ${activeTab === 'candate' ? 'bg-navy text-gold shadow-md' : 'text-slate hover:bg-sand/30'}`}>
                                <Icon name="clock" className="h-5 w-5 mb-1" /><span className="text-[10px] font-bold tracking-wider">CẬN DATE</span>
                            </button>
                            <button onClick={() => setActiveTab('dathang')} className={`flex flex-col items-center justify-center w-full py-3 rounded-2xl transition-all ${activeTab === 'dathang' ? 'bg-navy text-gold shadow-md' : 'text-slate hover:bg-sand/30'}`}>
                                <Icon name="shopping-cart" className="h-5 w-5 mb-1" /><span className="text-[10px] font-bold tracking-wider">ĐẶT HÀNG</span>
                            </button>
                            <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center justify-center w-full py-3 rounded-2xl transition-all ${activeTab === 'dashboard' ? 'bg-navy text-gold shadow-md' : 'text-slate hover:bg-sand/30'}`}>
                                <Icon name="layout-dashboard" className="h-5 w-5 mb-1" /><span className="text-[10px] font-bold tracking-wider">DASHBOARD</span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
